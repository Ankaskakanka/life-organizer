      "attachments": [],
      "notes": "Iliyan did the research part here: https://cludosearch.atlassian.net/browse/CDT-7907\n\n--- Iliyan's findings (CDT-7907) ---\n\nShort-term fix (already live): Improvements to the current E5-small model are deployed. They only work with the VectorSimilarity engine config, and require dropping the similarity coefficient from 0.9 → 0.8 or 0.82. Results improve but are still not perfect.\n\nRoot cause: E5-small model (384 dimensions) has limited multilingual support, especially for short/single-keyword queries in non-English languages (Polish, German, Spanish tested).\n\nProposed solution — GTE model (opt-in per customer):\n• GTE has 2x the vector dimensions of E5-small\n• Much better at multilingual queries\n• Also improves relevance for English-only queries\n• Cannot replace E5-small globally — would require re-indexing all customer indices (very time-consuming)\n\nImplementation approach: Add a customer-level config to select the embedding model. E5-small stays as the default; GTE can be enabled for specific customers (e.g. customer 3309).\n\nCost impact: Doubles vector search costs — from ~$1,000–1,500/month to ~$2,000–3,000/month (EU + US combined).\n\nPerformance note: GTE is slower than E5-small for indexing very large indices (e.g. Find Law). For small indices, no noticeable impact on search or indexing speed.\n\n⚠️ Decision needed: Iliyan is waiting for a go-ahead to put the GTE changes live.",

      "id": "disc_handover_01",
      "title": "Human Handover for AI Chat",
      "status": "done",
      "confluencePublished": true,
      "confluencePublishedAt": "2026-04-08T15:00:00.000Z",
      "confluenceUrl": "https://cludosearch.atlassian.net/wiki/spaces/PROD/pages/4602626050/Human+Handover+for+AI+Chat+-+Discovery+Report",
      "createdAt": "2026-04-08T10:30:00.000Z",
      "brief": {
        "goal": "We want to add human handover to our AI Chat product — when the AI can't help or the user asks for a human, seamlessly transfer the conversation to a live agent. We need to understand how the industry handles this so we can design Cludo's version.",
        "targetUser": "Customer service teams at mid-market and enterprise companies using Cludo's AI Chat on their website.",
        "knownContext": "Cludo currently has AI Chat (conversational search) but no live agent handover. Competitors like Intercom, Zendesk, and Glia have this. We serve European public sector, higher education, and enterprise clients — EU data residency matters.",
        "keyQuestions": "How do competitors trigger handover (AI-initiated vs user-initiated)? What does the agent UI look like? How is the conversation context passed to the agent? How is it priced (add-on vs included)? What are common failure patterns? What does a minimal v1 look like?"
      },
      "report": {
        "researchedAt": "2026-04-08T18:30:00.000Z",
        "summary": "Web-verified analysis of 10 enterprise AI Chat platforms confirms human handover is now table-stakes functionality with sophisticated implementation patterns. Key finding: all major platforms now use AI-powered escalation detection (sentiment, confidence thresholds, explicit requests) combined with configurable workflow builders. Intercom leads with natural-language Escalation Guidance and $0.99/outcome pricing. Zendesk uses a switchboard architecture with Pass Control API for metadata-rich transfers. Glia dominates banking with 900+ pre-built journeys and 60% containment rate. Tidio offers the most transparent priority system (Flows → Lyro Tasks → Lyro AI → Agents). HubSpot provides the most accessible handoff configuration with custom triggers and workflow templates. The primary competitive gap for Cludo: no major competitor combines EU data residency + search-first AI + human handover in a single product.",
        "competitorAnalysis": "INTERCOM (verified from help docs, April 2026): Fin AI Agent uses a three-layer escalation system: (1) Default behavior — auto-escalates when customer clearly asks for human, detects strong frustration, or conversation loops across 3+ turns. (2) Escalation Rules — data-driven triggers based on attributes like Sentiment=Negative, Issue Type=Bug, or custom fields like VIP_customer=true. (3) Escalation Guidance — natural language instructions that tell Fin when/how to escalate (e.g. 'If customer mentions a competitor, escalate immediately'). Fin distinguishes between offering escalation (soft prompt) and immediate escalation. Post-escalation routing uses Workflow branches based on which escalation was applied, enabling different handling per scenario. Pricing: $0.99 per outcome (resolution OR intentional handoff), plans from $29/seat/month (Essential/Advanced/Expert). Fin works on Intercom, Zendesk, and Salesforce. Handover to external tools uses Data Connectors (webhook-style API calls) configured in workflow builder.\n\nZENDESK (verified from support docs, April 2026): Uses a switchboard architecture where the Pass Control API transfers conversation ownership between systems. AI agents collect customer data (name, email, custom fields) before escalation via 'Make API call' step that replaces the default 'Transfer to agent' step. Metadata passed includes conversation_id, custom ticket fields, and tags via dataCapture.ticketField and dataCapture.systemField.tags patterns. Requires Sunshine Conversations API key setup with Basic authentication. Available on Suite Professional and Enterprise plans. The switchboard model is the most technically sophisticated — allows third-party bot systems to hand control back and forth with Zendesk Agent Workspace.\n\nFRESHDESK (verified from support docs, April 2026): Bot-to-agent handover ('Assign to Agent' action) is restricted to Enterprise-tier plans only (Freshdesk Forest/Enterprise, Freshdesk Omni Enterprise). Uses Freddy Self-service widget or Freshchat widget for deployment. BYOB (Bring Your Own Bot) option allows agent group selection during handoff. This is notably more restrictive than competitors — handover is NOT available on Growth or Pro plans.\n\nGLIA (verified from website, April 2026): Banking-focused platform with Glia Virtual Assistant (GVA) handling 900+ pre-built customer journeys with 92% understanding rate. Claims 60% containment of routine digital inquiries without human intervention. Key differentiator: 'ChannelLess' architecture preserves full context across AI-to-human and channel-to-channel transfers (chat-to-voice, voice-to-chat). AI CoPilot assists agents during handoff with real-time suggestions. Products now include Glia Banker (AI agent), Glia CoPilot (agent assist), Glia Analyst (insights), and Glia Voice. Offers 'Priceless Pricing™' — custom enterprise pricing only. HIPAA compliant for healthcare banking.\n\nTIDIO (verified from help docs, April 2026): Most transparent priority system documented: Flows (proactive) → Visitor Says flows → Lyro Tasks → Lyro AI Agent → Live Agents. Lyro conversation handoff has three configurable options: (1) Transfer conversation to agent, (2) Keep conversation (Lyro stays assigned), (3) Create a ticket. These can be configured separately for online/offline hours. Lyro Tasks are flow-based workflows triggered by keywords during Lyro conversations — they run inline without interrupting the AI conversation. Agents can manually join any Lyro conversation at any time via the Inbox. When Lyro is activated, Visitor Says flows are auto-disabled to prevent conflicts (can be re-enabled manually). Lyro included in platform pricing; Lyro AI features from $29/month.\n\nADA (verified from website, April 2026): Now positions as 'ACX Platform' (AI Customer Experience). Claims 80%+ automated resolution rate. Key feature: Playbooks — structured multi-step workflows using real-time data for handling complex tasks like subscription changes or refunds. Coaching feature lets teams give feedback on past conversations that automatically improves future responses. Omnichannel via Conversation Hub: voice, email, chat, Messenger, WhatsApp, SMS, Instagram, in-app, custom channels. Reasoning Engine™ powers autonomous decision-making with multi-layer safeguards. Developer Toolkit with APIs, MCP, and SDKs. Enterprise-grade: HIPAA, SOC2, GDPR, AIUC-1 compliant. Zero data retention with LLM providers. Custom pricing only.\n\nDRIFT/SALESLOFT (verified from website, April 2026): Now fully absorbed into Salesloft platform. Live Chat focused exclusively on sales qualification, not customer service handover. Features: Chat to Call, Chat to Zoom for instant meeting booking. Targets VIP/ABM accounts with real-time rep notification when target accounts visit. No documented customer service handover workflow — this is a sales tool, not a support tool. Enterprise contracts only for full features.\n\nLIVECHAT (verified from website, April 2026): Part of Text, Inc. product family (LiveChat, ChatBot, HelpDesk, KnowledgeBase). AI-powered features integrated into live chat but handover is primarily managed through the companion ChatBot product. Simple hybrid model where chatbot transfers to live agents. Pricing from ~$20/agent/month. Less sophisticated escalation logic compared to Intercom/Zendesk.\n\nHUBSPOT (verified from knowledge base, April 2026): Customer Agent handoff has three modes: (1) Live handoff — assign to next available human agent immediately, (2) Async handoff — assign for follow-up later, (3) Don't handoff — AI continues. Custom triggers configurable via specific words/phrases (e.g. 'cancellation', 'refund', 'can't log in'). Routing options: direct to inbox/users/teams, OR workflow-based routing using ticket-based workflows for conditional assignment. Pre-built workflow template 'Reassign Tickets for Customer Agent Handoff' available. Available on Professional and Enterprise plans across all Hubs. Customizable handoff messages for available/unavailable states.\n\nGENESYS (verified from website, April 2026): Now positions as 'Agentic Virtual Agents' powered by Large Action Models (LAMs) rather than traditional LLMs. Key differentiator: LAM-powered reasoning enables virtual agents to plan and execute complete workflows across systems autonomously. No-code design via Genesys Cloud AI Studio. Handles off-script moments with intelligent re-planning. Enterprise seat-based licensing. Strongest in omnichannel orchestration across voice, chat, email, and social channels.",
        "patterns": "All 10 competitors now support AI-triggered escalation (confidence/sentiment thresholds) AND user-triggered escalation (explicit 'talk to human' requests). Verified patterns from live documentation: (1) Escalation Configuration Sophistication varies dramatically — Intercom offers natural-language Escalation Guidance (describe when to escalate in plain English), while Zendesk requires API-level switchboard configuration, and HubSpot uses simple keyword triggers. (2) The 'soft escalation' pattern is emerging — Intercom's Fin offers escalation before forcing it (asks 'Would you like to speak with a human teammate?'), preventing premature handoffs that hurt resolution rates. (3) Post-escalation routing is now workflow-driven — all major platforms (Intercom, Zendesk, HubSpot, Tidio) use visual workflow builders to determine what happens AFTER escalation is triggered (which team, what data to collect, which channel). (4) Three-option handoff is becoming standard — Tidio and HubSpot both offer live transfer / async follow-up / keep-AI-assigned as configurable options, with different settings for online vs offline hours. (5) Metadata transfer at handoff is technically sophisticated — Zendesk passes custom ticket fields and tags via API, Intercom uses Data Connectors for webhook-based context transfer, HubSpot uses workflow-based ticket enrichment. (6) Agent takeover at any time is expected — Tidio, Intercom, and HubSpot all allow human agents to manually join AI conversations without waiting for formal escalation. (7) Pricing split: outcome-based (Intercom at $0.99/outcome) vs seat-based (Zendesk, HubSpot) vs platform-bundled (Tidio, Glia, Ada).",
        "uxDesign": "Verified UX patterns from competitor documentation: (1) Intercom's escalation flow uses a two-step pattern — Fin first sends a soft offer message ('I understand this is causing frustration. Would you like to speak with a human teammate, or would you prefer to continue working with me?') before hard-escalating. This reduces unnecessary handoffs. Fin never offers escalation twice in a row to prevent loops. (2) Tidio's agent workspace shows Lyro conversations in a dedicated folder in the Inbox sidebar, with a 'Join conversation' button for agents to take over. Chat assignment can be automatic (round-robin) or manual (Unassigned folder). (3) HubSpot's handoff uses custom trigger words and shows different messages for available vs unavailable states. The 'Reassign Tickets for Customer Agent Handoff' workflow template provides out-of-box routing by channel. (4) Zendesk's Agent Workspace receives transferred conversations as messaging tickets with custom fields pre-populated from bot metadata (via dataCapture.ticketField pattern). (5) Glia's ChannelLess architecture means the same conversation can move between chat, voice, and video without losing context — the agent sees a unified interaction history. (6) For the end-user chat widget, the dominant pattern is: AI responds → detects escalation trigger → shows transition message ('Connecting you with a specialist...') → agent joins with full context visible. (7) Mobile-first design is now standard — all platforms support responsive chat widgets with collapsible context panels.",
        "pricing": "Verified pricing from competitor websites (April 2026): INTERCOM — $0.99 per outcome (outcome = resolution OR intentional handoff, charged once per conversation). Plans: Essential/Advanced/Expert from $29/seat/month. Fin works cross-platform (on Zendesk, Salesforce) at same $0.99/outcome with no integration fees. 50 outcomes/month minimum for external platform usage. ZENDESK — AI agent capabilities bundled with Suite Professional ($55/agent/month) and Enterprise plans. Conversations API (needed for metadata handoff) requires Professional tier minimum. FRESHDESK — Bot-to-agent handover restricted to Enterprise plans ONLY (not available on Free, Growth, or Pro). This is the most restrictive gating of handover among all competitors reviewed. GLIA — 'Priceless Pricing™' custom enterprise pricing. Banking-focused, no public pricing. TIDIO — Lyro AI from $29/month, platform pricing starts free. Handoff included in platform, not a separate charge. LIVECHAT — From ~$20/agent/month (part of Text, Inc. suite). ADA — Custom enterprise pricing only. HIPAA/SOC2/GDPR compliant. HUBSPOT — Available on Professional ($50/month+) and Enterprise plans across Service Hub and other Hubs. Handoff included, not an add-on. GENESYS — Enterprise seat-based licensing, custom pricing. DRIFT/SALESLOFT — Enterprise contracts only, sales-focused. KEY INSIGHT: Handover is universally NOT treated as a premium add-on requiring separate purchase. The competitive opportunity is in how it's priced (per-outcome vs per-seat) and at which plan tier it becomes available.",
        "technical": "Verified technical architectures from competitor documentation: (1) SWITCHBOARD MODEL (Zendesk): Central routing layer manages conversation ownership. Pass Control API (POST to /v2/apps/{appId}/conversations/{conversationId}/passControl) transfers control between switchboard integrations. Metadata passed in request body includes switchboardIntegration ID and custom fields via dataCapture.ticketField.{fieldId} and dataCapture.systemField.tags patterns. Requires Sunshine Conversations API key with Basic auth. Available via Web Widget, mobile SDKs, and social messaging channels. (2) WORKFLOW + DATA CONNECTOR MODEL (Intercom): Escalation configured via Escalation Rules (data-attribute conditions like Sentiment, Issue Type, CDA values) and Escalation Guidance (natural language instructions). Post-escalation workflow uses Data Connectors to make API calls to external systems. Workflow steps: Send message → Collect info → API call to create ticket on external tool. Works with Zendesk API, Freshdesk API, any REST endpoint. (3) PRIORITY CASCADE MODEL (Tidio): Five-level priority: Flows → Visitor Says flows → Lyro Tasks → Lyro AI → Agents. Lyro Tasks are keyword-triggered flow sequences that run inline during AI conversations. Handoff options configurable separately for online/offline: transfer to agent, keep conversation, create ticket. Channels configurable per-feature (widget, Messenger, Instagram, WhatsApp). (4) WORKFLOW TEMPLATE MODEL (HubSpot): Custom triggers based on keywords. Three handoff modes (live/async/none). Routing via ticket-based workflows or conversation-based workflows. Pre-built 'Reassign Tickets for Customer Agent Handoff' template uses channel-based round-robin assignment. Agent availability checked automatically. (5) LAM-POWERED MODEL (Genesys): Large Action Models for autonomous multi-step execution. No-code configuration via AI Studio. Intelligent re-planning for off-script moments. Cross-system workflow execution. (6) EU DATA RESIDENCY: Ada offers GDPR, SOC2, HIPAA, AIUC-1 compliance with zero data retention policies with LLM providers. Glia offers HIPAA compliance. Intercom and Zendesk offer EU data hosting options. This remains a key differentiator for Cludo serving European public sector.",
        "recommendations": "Based on verified competitor research, Cludo v1 MVP recommendations: (1) Implement TWO escalation trigger types: user-initiated (button click + keyword detection like HubSpot's approach) and AI-initiated (confidence threshold). Start with user-initiated in v1, add AI sentiment detection in v2. (2) Follow Tidio's three-option handoff model: offer 'Transfer to agent' / 'Create ticket for follow-up' / 'Keep AI assigned' — configurable separately for online and offline hours. This matches the verified industry standard. (3) For context transfer, follow Zendesk's metadata pattern: pass structured data (transcript, summary, intent, customer ID, custom fields) via API. Use webhook/API approach rather than requiring agents to use Cludo's UI — support Zendesk, Freshdesk, Intercom as handoff targets via their APIs. (4) Adopt Intercom's 'soft escalation' UX pattern: offer escalation before forcing it. This is proven to reduce unnecessary handoffs and improve AI resolution rates. Never offer escalation twice in a row (Intercom's anti-loop rule). (5) Pricing: include handover in ALL AI Chat plans (do not gate behind Enterprise like Freshdesk). This matches Intercom, HubSpot, and Tidio's approach and differentiates from Freshdesk's restrictive model. Consider per-outcome pricing like Intercom ($0.99/outcome) as an option alongside seat-based pricing. (6) EU data residency from day one: host conversation data in EU. This is Cludo's strongest competitive moat — Ada and Glia offer compliance but aren't search-first platforms. No competitor combines EU-hosted search + AI chat + human handover. (7) Build agent availability check before transfer — don't queue if no agents online. Offer email/ticket callback as fallback (verified as standard pattern across all competitors). (8) For the agent workspace, start by integrating with existing helpdesks (Zendesk, Freshdesk, Intercom) via their APIs rather than building a native agent dashboard. This matches how Intercom's Fin already works cross-platform. (9) Implement HubSpot-style custom keyword triggers as the simplest v1 escalation configuration — let admins specify words/phrases that trigger handoff. (10) Plan v2 features: natural-language Escalation Guidance (Intercom-style), sentiment-based auto-escalation, Lyro-style inline Tasks during AI conversations, agent takeover without formal escalation. (11) Measure: time-to-connect, context preservation rate (did agent re-ask questions?), resolution rate post-handoff, containment rate (conversations resolved without handoff). These are the metrics all competitors track.",

      title: "Ai Chat Human Handover",
      status: "published",
      createdAt: "2026-04-08T14:49:34.159Z",
      answers: {},
      document: "## Summary\n\nLet website visitors escalate from AI Chat to human support when the AI cannot help. Customers configure handover triggers and collect visitor contact info via form, with full context sent to their support system via webhook.\n\n## Problem Statement\n\nWebsite visitors using AI Chat get frustrated when they can't find answers and have no way to reach human support. Support teams see repeat contacts because users can't escalate failed AI conversations with context. This hurts user experience and wastes support time re-explaining issues.\n\n## Goals & Success Metrics\n\n* 50% of customers with AI Chat enable handover within 3 months\n* 85% handover completion rate (users who start form actually submit it)\n\n## User Stories\n\n* When AI Chat can't answer my question, I want to easily contact a human, so I can get the help I need without starting over\n* When a visitor requests human help, I want their full conversation history and contact info, so I can resolve their issue quickly\n* When setting up AI Chat, I want to configure when handover appears, so I can control support volume\n* When my support system receives handovers, I want them routed to the right team, so issues get handled efficiently\n* When visitors submit handover requests, I want to track how often this happens, so I can improve my AI responses\n\n## Functional Requirements\n\n* Add human handover toggle in Experience Builder AI Chat configuration\n* Create handover trigger options: thumbs down feedback, specific canned response queries, after 3 unhelpful responses in a row\n* Build handover form with configurable fields: email (required), name, phone, additional message\n* Send full conversation context and form data to customer webhook endpoint\n* Display success message after form submission with fallback email option\n* Add handover analytics module to MyCludo dashboard showing trigger counts and completion rates\n* Support webhook test connection feature in Experience Builder\n\n## How It Works\n\n**Configuration in Experience Builder:** Customers enable human handover in their AI Chat settings. They configure three trigger types: thumbs down feedback, specific canned responses, and manual contact button (after 3 unhelpful responses). They set their webhook URL and customize form fields and messaging text.\n\n**Thumbs Down Trigger Flow:** When visitor clicks thumbs down, the chat shows a handover prompt. If yes, the handover form appears inline. On submit, webhook fires with full chat history and form data. Success message appears. If webhook fails, fallback shows support email.\n\n**Canned Response Trigger Flow:** Customer configures specific canned responses as handover triggers. When visitor's query matches, AI gives the canned response plus automatic handover prompt. Same form flow and webhook process.\n\n**After 3 Unhelpful Responses:** A 'Contact Support' button appears in the AI Chat widget. Clicking it shows the same handover form and webhook flow.\n\n**Webhook Payload:** System sends JSON with conversation array, visitor data, metadata (trigger type, page URL, user agent), and routing info. Includes retry logic with exponential backoff.\n\n**Analytics in MyCludo:** New dashboard module shows handover metrics: total requests, trigger type breakdown, completion rates, and webhook success rates. Filters by date range and AI Chat instance.\n\n## User Flows\n\n**Visitor Escalation Flow:**\n\n1. Visitor chats with AI and gets unsatisfactory response\n2. Visitor clicks thumbs down or encounters trigger query\n3. Handover prompt appears with customizable message text\n4. Visitor fills out contact form with conversation context visible\n5. System sends webhook to customer support platform\n6. Success message confirms request sent\n\n**Customer Setup Flow:**\n\n1. Customer opens Experience Builder AI Chat configuration\n2. Enables human handover toggle and enters webhook URL\n3. Configures trigger conditions and form fields\n4. Tests webhook connection and customizes messaging\n5. Saves configuration and publishes to live site\n\n## Acceptance Criteria\n\n* **Given** handover is enabled and visitor gives thumbs down **When** handover prompt appears **Then** form shows with conversation context and required email field\n* **Given** visitor submits handover form **When** webhook URL is valid **Then** full conversation and form data POSTs to customer endpoint within 5 seconds\n* **Given** webhook fails **When** form submitted successfully **Then** fallback message displays customer support email and form data saves for manual processing\n* **Given** customer configures canned response triggers **When** visitor query matches trigger **Then** handover prompt appears automatically after AI response\n* **Given** handover requests submitted **When** customer views MyCludo analytics **Then** dashboard shows trigger counts, completion rates, and webhook status for last 30 days\n\n## Out of Scope\n\n* Live chat integration (v2 feature)\n* Confidence score based triggers\n* Real-time agent availability status\n* Chat queue management or wait time estimates\n* Mobile app integration beyond responsive web widget\n* Advanced routing rules beyond basic webhook data\n* Built-in support ticket system\n\n## Technical Notes\n\n* Webhook architecture supports any REST API endpoint (Zendesk, Intercom, custom systems)\n* Retry logic: 3 attempts with exponential backoff for failed webhooks\n* Rate limiting: max 100 handover requests per customer per hour\n* Conversation data includes full message history in structured JSON format\n\n## Design Notes\n\nKey screens: Experience Builder handover configuration panel, AI Chat widget handover prompt overlay, inline contact form, success confirmation message. The handover prompt should feel integrated into chat flow, not a disruptive popup. Use Cludo brand colors with clear CTA buttons. Form fields stack vertically on mobile. Success state shows checkmark icon with reassuring message. Analytics dashboard uses simple charts showing trends over time.\n\n## Launch Plan\n\nFull rollout to all customers at the same time. Feature announcement in monthly newsletter. Success metrics review after 6 weeks to plan v2 live chat integration.",

// ── Storage ──────────────────────────────────────────────
// localStorage keeps your tasks safe across refreshes.
// When Claude updates the file (new APP_DATA.version), we merge:
//   • Claude's updated tasks (by id) replace old ones
//   • Tasks you added in the browser (not in the file) are preserved
const LS_KEY = 'anna_tasks_store';

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const stored = JSON.parse(raw);
      if (stored.fileVersion === APP_DATA.version) {
        // Same file version — use your saved working copy
        state.tasks             = stored.tasks || [];
        state.categories        = stored.categories || JSON.parse(JSON.stringify(APP_DATA.categories));
        state.version           = stored.version || APP_DATA.version;
        state.pendingTasks      = stored.pendingTasks || [];
        state.dismissedIds      = stored.dismissedIds || APP_DATA.dismissedIds || [];
        state.jiraPendingTasks        = stored.jiraPendingTasks || [];
        state.jiraDismissedIds        = stored.jiraDismissedIds || APP_DATA.jiraDismissedIds || [];
        state.confluencePendingTasks  = stored.confluencePendingTasks || [];
        state.confluenceDismissedIds  = stored.confluenceDismissedIds || APP_DATA.confluenceDismissedIds || [];
        state.focusedTaskIds          = stored.focusedTaskIds || [];
        state.dismissedFeedbackRecs   = stored.dismissedFeedbackRecs || [];
        state.dailyNotes              = stored.dailyNotes || APP_DATA.dailyNotes || '';
        const _adm = {}; (APP_DATA.discoveryProjects || []).forEach(p => { _adm[p.id] = p; });
        const _sdi = new Set((stored.discoveryProjects || []).map(p => p.id));
        state.discoveryProjects = [
          ...(stored.discoveryProjects || []).map(p => { const ap = _adm[p.id]; return ap ? { ...ap, ...p, confluenceUrl: ap.confluenceUrl || p.confluenceUrl } : p; }),
          ...(APP_DATA.discoveryProjects || []).filter(p => !_sdi.has(p.id))
        ];
        const _apm = {}; (APP_DATA.prdProjects || []).forEach(p => { _apm[p.id] = p; });
        const _spi = new Set((stored.prdProjects || []).map(p => p.id));
        const _urlsByTitle = APP_DATA.confluenceUrlsByTitle || {};
        state.prdProjects = [
          ...(stored.prdProjects || []).map(p => { const ap = _apm[p.id]; const urlByTitle = _urlsByTitle[p.title]; return ap ? { ...ap, ...p, confluenceUrl: ap.confluenceUrl || p.confluenceUrl || urlByTitle } : { ...p, confluenceUrl: p.confluenceUrl || urlByTitle }; }),
          ...(APP_DATA.prdProjects || []).filter(p => !_spi.has(p.id))
        ];
        state.calendarEvents          = APP_DATA.calendarEvents || [];
        state.confluencePublishQueue  = stored.confluencePublishQueue || APP_DATA.confluencePublishQueue || [];
      } else {
        // Claude updated the file — smart merge:
        //   • Tasks only in file → use file version
        //   • Tasks only in storage → keep (user added them)
        //   • Tasks in both → file wins on content fields,
        //     but PRESERVE user-managed fields (subtasks, attachments, status, etc.)
        const fileTasks  = JSON.parse(JSON.stringify(APP_DATA.tasks));
        const storedMap  = {};
        (stored.tasks || []).forEach(t => { storedMap[t.id] = t; });
        const fileIds    = new Set(fileTasks.map(t => t.id));
        const merged     = fileTasks.map(ft => {
          const st = storedMap[ft.id];
          if (!st) return ft;
          return {
            ...ft,
            status:        st.status        ?? ft.status,
            assignee:      st.assignee      ?? ft.assignee,
            collaborators: st.collaborators ?? ft.collaborators,
            subtasks:      (st.subtasks    && st.subtasks.length)    ? st.subtasks    : (ft.subtasks    || []),
            attachments:   (st.attachments && st.attachments.length) ? st.attachments : (ft.attachments || []),
          };
        });
        const userExtras   = (stored.tasks || []).filter(t => !fileIds.has(t.id));
        state.tasks        = [...merged, ...userExtras];
        state.categories   = JSON.parse(JSON.stringify(APP_DATA.categories));
        state.version      = APP_DATA.version;
        // Merge dismissedIds first, THEN filter pendingTasks so approved/dismissed items never reappear
        const merged_dismissed = [...new Set([...(APP_DATA.dismissedIds || []), ...(stored.dismissedIds || [])])];
        state.dismissedIds    = merged_dismissed;
        state.pendingTasks    = (APP_DATA.pendingTasks || []).filter(t => !merged_dismissed.includes(t.sourceUrl));
        const merged_jira_dismissed = [...new Set([...(APP_DATA.jiraDismissedIds || []), ...(stored.jiraDismissedIds || [])])];
        state.jiraDismissedIds    = merged_jira_dismissed;
        state.jiraPendingTasks    = (APP_DATA.jiraPendingTasks || []).filter(t => !merged_jira_dismissed.includes(t.sourceUrl));
        const merged_conf_dismissed = [...new Set([...(APP_DATA.confluenceDismissedIds || []), ...(stored.confluenceDismissedIds || [])])];
        state.confluenceDismissedIds    = merged_conf_dismissed;
        state.confluencePendingTasks    = (APP_DATA.confluencePendingTasks || []).filter(t => !merged_conf_dismissed.includes(t.sourceUrl));
        state.focusedTaskIds            = stored.focusedTaskIds || [];
        state.dismissedFeedbackRecs     = stored.dismissedFeedbackRecs || [];
        state.dailyNotes                = stored.dailyNotes || APP_DATA.dailyNotes || '';
        // Smart merge for discoveryProjects: user edits win, but new Claude-set fields (e.g. confluenceUrl) are picked up from APP_DATA
        const _appDiscMap = {}; (APP_DATA.discoveryProjects || []).forEach(p => { _appDiscMap[p.id] = p; });
        const _storedDiscIds = new Set((stored.discoveryProjects || []).map(p => p.id));
        state.discoveryProjects = [
          ...(stored.discoveryProjects || []).map(p => { const ap = _appDiscMap[p.id]; return ap ? { ...ap, ...p, confluenceUrl: ap.confluenceUrl || p.confluenceUrl } : p; }),
          ...(APP_DATA.discoveryProjects || []).filter(p => !_storedDiscIds.has(p.id))
        ];
        // Smart merge for prdProjects: same pattern
        const _appPrdMap = {}; (APP_DATA.prdProjects || []).forEach(p => { _appPrdMap[p.id] = p; });
        const _storedPrdIds = new Set((stored.prdProjects || []).map(p => p.id));
        state.prdProjects = [
          ...(stored.prdProjects || []).map(p => { const ap = _appPrdMap[p.id]; return ap ? { ...ap, ...p, confluenceUrl: ap.confluenceUrl || p.confluenceUrl } : p; }),
          ...(APP_DATA.prdProjects || []).filter(p => !_storedPrdIds.has(p.id))
        ];
        state.calendarEvents            = APP_DATA.calendarEvents || [];
      }
    } else {
      state.tasks            = JSON.parse(JSON.stringify(APP_DATA.tasks));
      state.categories       = JSON.parse(JSON.stringify(APP_DATA.categories));
      state.version          = APP_DATA.version;
      const _di  = APP_DATA.dismissedIds || [];
      const _jdi = APP_DATA.jiraDismissedIds || [];
      const _cdi = APP_DATA.confluenceDismissedIds || [];
      state.dismissedIds           = JSON.parse(JSON.stringify(_di));
      state.pendingTasks           = (APP_DATA.pendingTasks || []).filter(t => !_di.includes(t.sourceUrl));
      state.jiraDismissedIds       = JSON.parse(JSON.stringify(_jdi));
      state.jiraPendingTasks       = (APP_DATA.jiraPendingTasks || []).filter(t => !_jdi.includes(t.sourceUrl));
      state.confluenceDismissedIds = JSON.parse(JSON.stringify(_cdi));
      state.confluencePendingTasks = (APP_DATA.confluencePendingTasks || []).filter(t => !_cdi.includes(t.sourceUrl));
      state.focusedTaskIds         = JSON.parse(JSON.stringify(APP_DATA.focusedTaskIds || []));
      state.dailyNotes             = APP_DATA.dailyNotes || '';
      state.discoveryProjects      = JSON.parse(JSON.stringify(APP_DATA.discoveryProjects || []));
      state.prdProjects            = JSON.parse(JSON.stringify(APP_DATA.prdProjects || []));
      state.calendarEvents         = APP_DATA.calendarEvents || [];
      state.confluencePublishQueue = JSON.parse(JSON.stringify(APP_DATA.confluencePublishQueue || []));
    }
  } catch(e) {
    state.tasks            = JSON.parse(JSON.stringify(APP_DATA.tasks));
    state.categories       = JSON.parse(JSON.stringify(APP_DATA.categories));
    state.version          = APP_DATA.version;
    const _di  = APP_DATA.dismissedIds || [];
    const _jdi = APP_DATA.jiraDismissedIds || [];
    const _cdi = APP_DATA.confluenceDismissedIds || [];
    state.dismissedIds           = JSON.parse(JSON.stringify(_di));
    state.pendingTasks           = (APP_DATA.pendingTasks || []).filter(t => !_di.includes(t.sourceUrl));
    state.jiraDismissedIds       = JSON.parse(JSON.stringify(_jdi));
    state.jiraPendingTasks       = (APP_DATA.jiraPendingTasks || []).filter(t => !_jdi.includes(t.sourceUrl));
    state.confluenceDismissedIds = JSON.parse(JSON.stringify(_cdi));
    state.confluencePendingTasks = (APP_DATA.confluencePendingTasks || []).filter(t => !_cdi.includes(t.sourceUrl));
    state.focusedTaskIds         = JSON.parse(JSON.stringify(APP_DATA.focusedTaskIds || []));
    state.calendarEvents         = APP_DATA.calendarEvents || [];
  }
  saveState();
}

function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({
    fileVersion:       APP_DATA.version,
    version:           state.version,
    tasks:             state.tasks,
    categories:        state.categories,
    pendingTasks:      state.pendingTasks,
    dismissedIds:      state.dismissedIds,
    jiraPendingTasks:        state.jiraPendingTasks,
    jiraDismissedIds:        state.jiraDismissedIds,
    confluencePendingTasks:  state.confluencePendingTasks,
    confluenceDismissedIds:  state.confluenceDismissedIds,
    focusedTaskIds:          state.focusedTaskIds,
    dailyNotes:              state.dailyNotes,
    discoveryProjects:       state.discoveryProjects,
    prdProjects:             state.prdProjects,
    dismissedFeedbackRecs:   state.dismissedFeedbackRecs
  }));
  scheduleAutoSave();
}

// ── Task CRUD ─────────────────────────────────────────────
function addTask(data) {
  const task = {
    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
    title: data.title || '',
    status: data.status || 'todo',
    priority: data.priority || 'medium',
    category: data.category || '',
    subcategory: data.subcategory || '',
    assignee: data.assignee || '',
    collaborators: data.collaborators || '',
    jiraTicket: data.jiraTicket || '',
    subtasks: data.subtasks || [],
    attachments: data.attachments || [],
    notes: data.notes || '',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  state.tasks.unshift(task);
  saveState();
  renderApp();
}

function updateTask(id, updates) {
  const i = state.tasks.findIndex(t => t.id === id);
  if (i !== -1) {
    state.tasks[i] = { ...state.tasks[i], ...updates, updatedAt: new Date().toISOString() };
    saveState();
    renderApp();
  }
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState();
  renderApp();
}

// ── Subtask CRUD ──────────────────────────────────────────
function addSubtask(taskId, title) {
  const i = state.tasks.findIndex(t => t.id === taskId);
  if (i === -1) return;
  if (!state.tasks[i].subtasks) state.tasks[i].subtasks = [];
  state.tasks[i].subtasks.push({
    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
    title,
    done: false
  });
  state.tasks[i].updatedAt = new Date().toISOString();
  saveState();
  renderApp();
}

function toggleSubtask(taskId, subtaskId) {
  const i = state.tasks.findIndex(t => t.id === taskId);
  if (i === -1) return;
  const si = (state.tasks[i].subtasks||[]).findIndex(s => s.id === subtaskId);
  if (si === -1) return;
  state.tasks[i].subtasks[si].done = !state.tasks[i].subtasks[si].done;
  state.tasks[i].updatedAt = new Date().toISOString();
  saveState();
  renderApp();
}

function deleteSubtask(taskId, subtaskId) {
  const i = state.tasks.findIndex(t => t.id === taskId);
  if (i === -1) return;
  state.tasks[i].subtasks = (state.tasks[i].subtasks||[]).filter(s => s.id !== subtaskId);
  state.tasks[i].updatedAt = new Date().toISOString();
  saveState();
  renderApp();
}

function openSubtaskInput(taskId) {
  const container = document.getElementById('subtask-add-' + taskId);
  if (!container) return;
  container.innerHTML = `
    <div style="display:flex;gap:6px;align-items:center;margin-top:2px;">
      <input id="new-subtask-${taskId}" type="text" placeholder="Add a subtask…"
        style="flex:1;border:1px solid #C7D2FE;border-radius:6px;padding:5px 9px;font-size:12.5px;color:#374151;"
        onkeydown="if(event.key==='Enter'){confirmAddSubtask('${taskId}');}if(event.key==='Escape'){renderApp();}">
      <button onclick="confirmAddSubtask('${taskId}')"
        style="background:#4F46E5;color:white;border:none;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">Add</button>
      <button onclick="renderApp()"
        style="border:1px solid #E5E7EB;background:white;color:#6B7280;padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer;">✕</button>
    </div>`;
  document.getElementById('new-subtask-' + taskId)?.focus();
}

function confirmAddSubtask(taskId) {
  const input = document.getElementById('new-subtask-' + taskId);
  const title = input?.value.trim();
  if (!title) { renderApp(); return; }
  addSubtask(taskId, title);
}

// ── Render Subtasks ───────────────────────────────────────
function renderSubtasks(t) {
  const subs = t.subtasks || [];
  const doneCount = subs.filter(s => s.done).length;
  const pct = subs.length > 0 ? Math.round((doneCount / subs.length) * 100) : 0;
  const barColor = pct === 100 ? '#22C55E' : '#4F46E5';

  return `<div style="margin-top:10px;padding-top:10px;border-top:1px solid #F3F4F6;">
      ${subs.length > 0 ? `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="flex:1;background:#F3F4F6;border-radius:999px;height:4px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:${barColor};border-radius:999px;transition:width 0.3s;"></div>
          </div>
          <span style="font-size:11px;color:#6B7280;white-space:nowrap;font-weight:500;">${doneCount}/${subs.length} done</span>
        </div>

function cycleStatus(id) {

  const order = ['todo','inprogress','done','delegate'];

  updateTask(id, { status: next });

function getCompetitorScreenshots(competitorId) {
  try { return JSON.parse(localStorage.getItem('comp_screenshots_' + competitorId) || '[]'); } catch(e) { return []; }
}
function saveCompetitorScreenshot(competitorId, dataUrl, caption) {
  const shots = getCompetitorScreenshots(competitorId);
  shots.push({ dataUrl, caption: caption || '', addedAt: new Date().toISOString().slice(0,10) });
  localStorage.setItem('comp_screenshots_' + competitorId, JSON.stringify(shots));
  renderApp();
}
function deleteCompetitorScreenshot(competitorId, index) {
  const shots = getCompetitorScreenshots(competitorId);
  shots.splice(index, 1);
  localStorage.setItem('comp_screenshots_' + competitorId, JSON.stringify(shots));
  renderApp();
}
function updateScreenshotCaption(competitorId, index, caption) {
  const shots = getCompetitorScreenshots(competitorId);
  if (shots[index]) { shots[index].caption = caption; localStorage.setItem('comp_screenshots_' + competitorId, JSON.stringify(shots)); }
}
function triggerScreenshotUpload(competitorId, suggestedCaption) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = !suggestedCaption;
  input.onchange = (e) => {
    const files = Array.from(e.target.files);
    files.forEach((file, i) => {
      const reader = new FileReader();
      reader.onload = (ev) => saveCompetitorScreenshot(competitorId, ev.target.result, i === 0 && suggestedCaption ? suggestedCaption : '');
      reader.readAsDataURL(file);
    });
  };
  input.click();
}
function handleScreenshotDrop(e, competitorId) {
  e.preventDefault();
  e.currentTarget.style.borderColor = '#E5E7EB';
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => saveCompetitorScreenshot(competitorId, ev.target.result, '');
    reader.readAsDataURL(file);
  });
}

function saveChatToHistory() {
  if (!state.industryChatMessages || state.industryChatMessages.length === 0) return;
  const firstUserMsg = state.industryChatMessages.find(m => m.role === 'user');
  const title = firstUserMsg ? firstUserMsg.content.substring(0, 50) + (firstUserMsg.content.length > 50 ? '...' : '') : 'New chat';
  const entry = {
    id: state.activeChatId || ('chat_' + Date.now()),
    title: title,
    messages: [...state.industryChatMessages],
    updatedAt: new Date().toISOString()
  };
  let history = state.industryChatHistory || [];
  const idx = history.findIndex(h => h.id === entry.id);
  if (idx >= 0) { history[idx] = entry; } else { history.unshift(entry); }
  state.industryChatHistory = history;
  state.activeChatId = entry.id;
  localStorage.setItem('industry_chat_history', JSON.stringify(history));
}

function loadChatFromHistory(chatId) {
  const entry = (state.industryChatHistory || []).find(h => h.id === chatId);
  if (entry) {
    state.industryChatMessages = [...entry.messages];
    state.activeChatId = entry.id;
    renderApp();
    setTimeout(() => { const el = document.getElementById('industryChatMessages'); if (el) el.scrollTop = el.scrollHeight; }, 60);
  }
}

function deleteChatFromHistory(chatId, evt) {
  evt.stopPropagation();
  state.industryChatHistory = (state.industryChatHistory || []).filter(h => h.id !== chatId);
  localStorage.setItem('industry_chat_history', JSON.stringify(state.industryChatHistory));
  if (state.activeChatId === chatId) {
    state.activeChatId = null;
    state.industryChatMessages = [];

  renderApp();
}

async function sendIntelligenceChat(forcedMsg) {
  const input = document.getElementById('industryChatInput');
  const msg = forcedMsg || (input ? input.value.trim() : '');
  if (!msg || state.industryChatLoading) return;
  if (input) input.value = '';
  if (!state.industryChatMessages) state.industryChatMessages = [];
  state.industryChatMessages = [...state.industryChatMessages, { role: 'user', content: msg }];
  state.industryChatLoading = true;
  renderApp();
  const compSummary = INDUSTRY_COMPETITORS.map(c =>
    c.name + ': ' + c.summary + ' Pricing: ' + c.pricing + '. Deal history: ' + c.dealHistory + '. EU data: ' + (c.euDataStorage ? 'Yes' : 'No') + '. EU AI inference: ' + (c.euAiInference ? 'Yes' : 'No') + '. Cludo edge: ' + c.cludoEdge
  ).join('\n\n');
  const recentNews = INDUSTRY_NEWS.slice(0, 6).map(n => n.date + ' — ' + n.title + ': ' + n.summary).join('\n');
  const systemPrompt = 'You are a competitive intelligence analyst for Cludo, an AI-powered search and conversational AI platform for websites, primarily serving European public sector, higher education, and enterprise clients. Cludo is headquartered in Copenhagen, Denmark. Key Cludo facts: EU data residency and AI inference (strong differentiator), no-code setup, easy CMS integrations, strong analytics, conversational AI/chat search, multilingual.\n\nCOMPETITOR PROFILES:\n' + compSummary + '\n\nRECENT COMPETITIVE INTELLIGENCE:\n' + recentNews + '\n\nAnswer questions concisely and helpfully with actionable insights. Keep responses to 3-4 paragraphs max. Focus on what is most useful for a product manager preparing competitive positioning.';
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': state.industryApiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-opus-4-6', max_tokens: 800, system: systemPrompt, messages: state.industryChatMessages.map(m => ({ role: m.role, content: m.content })) })
    });
    if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error((err.error && err.error.message) || 'API error ' + response.status); }
    const data = await response.json();
    state.industryChatMessages = [...state.industryChatMessages, { role: 'assistant', content: data.content[0].text }];
  } catch(err) {
    state.industryChatMessages = [...state.industryChatMessages, { role: 'assistant', content: '⚠️ Error: ' + err.message + '. Check your API key and try again.' }];
  }
  state.industryChatLoading = false;
  saveChatToHistory();
  renderApp();
  setTimeout(() => { const el = document.getElementById('industryChatMessages'); if (el) el.scrollTop = el.scrollHeight; }, 60);
}

// ── Product Discovery Functions ───────────────────────────
function createDiscoveryProject() {
  const title = document.getElementById('discoveryNewTitle');
  if (!title || !title.value.trim()) return;
  const project = {
    id: 'disc_' + Date.now(),
    title: title.value.trim(),
    status: 'draft',
    createdAt: new Date().toISOString(),
    brief: { goal: '', targetUser: '', knownContext: '', keyQuestions: '' },
    report: null
  };
  state.discoveryProjects = [project, ...(state.discoveryProjects || [])];
  state.activeDiscoveryId = project.id;
  saveState();
  renderApp();
}

function selectDiscoveryProject(id) {
  state.activeDiscoveryId = id;
  renderApp();
}

function deleteDiscoveryProject(id, evt) {
  evt.stopPropagation();
  state.discoveryProjects = (state.discoveryProjects || []).filter(p => p.id !== id);
  if (state.activeDiscoveryId === id) state.activeDiscoveryId = null;
  saveState();
  renderApp();
}

function updateDiscoveryBrief(field, val) {
  const proj = (state.discoveryProjects || []).find(p => p.id === state.activeDiscoveryId);
  if (proj) { proj.brief[field] = val; saveState(); }
}

function saveConfluenceUrl(type, projId, url) {
  const list = type === 'disc' ? (state.discoveryProjects || []) : (state.prdProjects || []);
  const proj = list.find(p => p.id === projId);
  if (!proj) return;
  proj.confluenceUrl = url.trim();
  saveState();
  renderApp();
}

function submitDiscoveryForResearch() {
  const proj = (state.discoveryProjects || []).find(p => p.id === state.activeDiscoveryId);
  if (!proj) return;
  const apiKey = state.industryApiKey || '';
  if (!apiKey) {
    alert('Please set your Anthropic API key first (go to Industry Updates → Intelligence Chat to set it up).');
    return;
  }
  runDiscoveryResearch(proj.id);
}

async function publishDiscoveryToConfluence(projId) {
  const proj = (state.discoveryProjects || []).find(p => p.id === projId);
  if (!proj || !proj.report) { alert('No report to publish.'); return; }
  const r = proj.report;
  const btn = document.getElementById('confluence-btn-' + projId);
  if (btn) { btn.disabled = true; btn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83"/></svg> Publishing…</span>'; }
  try {
    let md = '# ' + (proj.title || 'Discovery Report') + '\n\n';
    if (r.summary) md += '> ' + r.summary + '\n\n';
    const secs = [
      ['How Competitors Handle It', r.competitorAnalysis],
      ['Common Patterns & Best Practices', r.patterns],
      ['UX & Design Approaches', r.uxDesign],
      ['Pricing & Packaging', r.pricing],
      ['Technical Considerations', r.technical],
      ['Recommendations for Cludo', r.recommendations]
    ];
    secs.forEach(function(s) {
      if (s[1]) md += '## ' + s[0] + '\n\n' + s[1] + '\n\n';
    });
    if (r.sources) {
      md += '## Sources\n\n';
      let srcList = r.sources;
      if (typeof srcList === 'string') srcList = srcList.split('\n').filter(s => s.trim());
      if (Array.isArray(srcList)) {
        srcList.forEach(function(url, i) { md += (i+1) + '. ' + url + '\n'; });
      }
    }
    if (r.followUps && r.followUps.length > 0) {
      md += '## Follow-up Questions\n\n';
      r.followUps.forEach(function(fu, i) {
        if (fu.answer) md += '### Q' + (i+1) + ': ' + fu.question + '\n\n' + fu.answer + '\n\n';
      });
    }
    if (r.researchedAt) md += '\n---\n*Researched: ' + new Date(r.researchedAt).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'}) + ' · Published from Product Hub*\n';
    const pageTitle = proj.title + ' — Discovery Report (' + new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) + ')';
    proj.confluencePublished = true;
    proj.confluencePublishedAt = new Date().toISOString();
    // Queue for the scheduled task to pick up and publish, then write the URL back
    if (!state.confluencePublishQueue) state.confluencePublishQueue = [];
    state.confluencePublishQueue = state.confluencePublishQueue.filter(q => q.projId !== projId);
    state.confluencePublishQueue.push({ projId, type: 'disc', title: pageTitle, body: md, spaceKey: 'PROD', status: 'pending', requestedAt: new Date().toISOString() });
    saveState();
    await saveFile(); // write queue to disk so the scheduled task can pick it up
    if (btn) {
      btn.innerHTML = '✓ Queued — publishing…';
      btn.style.background = '#22C55E'; btn.style.borderColor = '#22C55E'; btn.style.color = 'white';
      setTimeout(function() { btn.innerHTML = '✓ Update on Confluence'; btn.style.background = 'white'; btn.style.borderColor = '#22C55E'; btn.style.color = '#22C55E'; btn.disabled = false; }, 2500);
    }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> Add to Confluence'; }
    alert('Error: ' + e.message);
  }
}

async function runDiscoveryResearch(projId) {

  const apiKey = state.industryApiKey || '';

  proj.status = 'researching';
  saveState();
  renderApp();

  const compSummary = INDUSTRY_COMPETITORS.map(c =>
    c.name + ' (' + c.tier + '): ' + c.summary + '\nPricing: ' + c.pricing +

    '\nStrengths: ' + c.strengths.join(', ') + '\nWeaknesses: ' + c.weaknesses.join(', ') +
    '\nFeatures: ' + c.features.map(f => f.feature + '=' + (f.competitor ? 'Yes' : 'No')).join(', ') +
    (c.lostDeals ? '\nLost deals: ' + c.lostDeals.map(d => d.account + ' (' + d.reason + ')').join('; ') : '')

    '\n\nGOAL: ' + (brief.goal || 'Not specified') +

    '\n\nKEY QUESTIONS: ' + (brief.keyQuestions || 'General research');

  const systemPrompt = 'You are a senior product researcher helping a Product Manager at Cludo. Cludo is an AI-powered search and conversational AI platform for websites, serving European public sector, higher education, and enterprise clients. HQ: Copenhagen, Denmark. Key differentiators: EU data residency and AI inference, no-code setup, CMS integrations, strong analytics, conversational AI chat.\n\n' +
    'COMPETITOR INTELLIGENCE:\n' + compSummary + '\n\n' +
    'The user is researching a product feature or capability. Provide an extremely thorough analysis. You MUST respond with ONLY a valid JSON object (no markdown, no code fences, no extra text) with these exact fields:\n' +
    '{\n' +
    '  "summary": "<2-3 sentence executive summary of the most important findings>",\n' +
    '  "competitorAnalysis": "<detailed analysis naming specific competitors and exactly how each handles this feature — at least 5-6 competitors with specifics>",\n' +
    '  "patterns": "<common patterns and best practices across the industry, including user flow patterns, trigger mechanisms, fallback strategies>",\n' +
    '  "uxDesign": "<how different products present this in their UX — describe specific UI elements, user flows, visual approaches, mobile considerations>",\n' +
    '  "pricing": "<how competitors price this — which tier includes it, whether it is an add-on, per-seat pricing, usage pricing — name specific competitors and their pricing>",\n' +
    '  "technical": "<technical architecture patterns, APIs, webhooks, websockets, integration approaches, data flow considerations>",\n' +
    '  "recommendations": "<specific actionable recommendations for Cludo: what to build for v1, what to defer, how to position it, how to price it, what to avoid — tailored to Cludo market position and customers>",\n' +
    '  "visuals": [{"type":"image|video|diagram","url":"<source URL where the information came from>","caption":"<what this shows>","competitor":"<competitor name if applicable>","section":"competitors|ux|diagrams|general"}],\n' +
    '  "sources": ["<URL 1>", "<URL 2>", "..."]\n' +
    '}\n\nBe specific and detailed. Name competitors. Give concrete examples. Each field should be multiple paragraphs of substantive analysis.\n\nFor the visuals array: include 4-8 items. EVERY visual MUST have a "url" field with a real source URL. For images, use real publicly accessible URLs to competitor product screenshots or help article images — the url is both the image src and the clickable link. For videos, use competitor product page URLs (NOT YouTube embeds) — they render as clickable link cards. For diagrams, set type to "diagram", put an SVG string in an "svg" field (clean, professional, max 500px wide), and set "url" to the source page you based the diagram on. All visuals are rendered as links that open the source URL when clicked.\n\nFor sources: return an array of URL strings — include the documentation pages, help articles, pricing pages, and blog posts you referenced in the analysis. These will be rendered as clickable citation links.';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4096, system: systemPrompt, messages: [{ role: 'user', content: userPrompt }] })
    });
    if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error((err.error && err.error.message) || 'API error ' + response.status); }
    const data = await response.json();
    const text = data.content[0].text;

    let report;
    try {
      report = JSON.parse(text);
    } catch(e) {
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (jsonMatch) { report = JSON.parse(jsonMatch[0]); }
      else { throw new Error('Could not parse research response'); }
    }
    report.researchedAt = new Date().toISOString();
    report.sources = 'Analysis based on competitive intelligence data and industry knowledge.';
    proj.report = report;
    proj.status = 'done';
  } catch(err) {
    proj.status = 'draft';
    alert('Research failed: ' + err.message);
  }
  saveState();
  renderApp();
}

async function askDiscoveryFollowUp(projId) {
  const proj = (state.discoveryProjects || []).find(p => p.id === projId);
  if (!proj || !proj.report) return;
  const input = document.getElementById('followup-input-' + projId);
  if (!input || !input.value.trim()) return;
  const question = input.value.trim();
  const apiKey = state.industryApiKey || '';
  if (!apiKey) { alert('Set your API key in Intelligence Chat first.'); return; }
  input.value = '';
  const btn = document.getElementById('followup-btn-' + projId);
  if (btn) { btn.disabled = true; btn.textContent = 'Thinking…'; }

  // Add the question immediately as "pending"
  if (!proj.report.followUps) proj.report.followUps = [];
  const fuItem = { question: question, answer: null, askedAt: new Date().toISOString() };
  proj.report.followUps.push(fuItem);
  saveState();
  renderApp();

  const r = proj.report;
  const reportContext = [
    r.summary ? 'Summary: ' + r.summary : '',
    r.competitorAnalysis ? 'Competitor Analysis: ' + r.competitorAnalysis.substring(0, 2000) : '',
    r.patterns ? 'Patterns: ' + r.patterns.substring(0, 1000) : '',
    r.uxDesign ? 'UX Design: ' + r.uxDesign.substring(0, 1000) : '',
    r.pricing ? 'Pricing: ' + r.pricing.substring(0, 1000) : '',
    r.technical ? 'Technical: ' + r.technical.substring(0, 1000) : '',
    r.recommendations ? 'Recommendations: ' + r.recommendations.substring(0, 1000) : ''
  ].filter(s => s).join('\n\n');

  const prevQAs = (r.followUps || []).filter(f => f.answer).map(f => 'Q: ' + f.question + '\nA: ' + f.answer).join('\n\n');

  const systemPrompt = 'You are a product discovery research assistant for Cludo, a search-as-a-service company. You have already produced a detailed report on "' + proj.title + '". The user is now asking a follow-up question. Answer thoroughly with specific examples, competitor names, pricing details, and concrete recommendations where relevant. Reference the existing report context when building your answer. Keep your response focused and substantive — 2-5 paragraphs. Do NOT return JSON, just return plain text.';
  const userPrompt = 'EXISTING REPORT CONTEXT:\n' + reportContext + (prevQAs ? '\n\nPREVIOUS FOLLOW-UP Q&As:\n' + prevQAs : '') + '\n\nFOLLOW-UP QUESTION:\n' + question;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 2048, system: systemPrompt, messages: [{ role: 'user', content: userPrompt }] })
    });
    if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error((err.error && err.error.message) || 'API error ' + response.status); }
    const data = await response.json();
    fuItem.answer = data.content[0].text;
    fuItem.answeredAt = new Date().toISOString();
  } catch(err) {
    fuItem.answer = 'Failed to get answer: ' + err.message;
  }
  saveState();
  renderApp();
}

    return '<div style="flex:1;overflow-y:auto;padding:24px 28px;">'

        + '<div style="margin-bottom:20px;display:flex;align-items:start;justify-content:space-between;">'

            + '<button id="confluence-btn-'+p.id+'" onclick="publishDiscoveryToConfluence(\''+p.id+'\')" style="padding:5px 12px;border:1px solid '+(p.confluencePublished ? '#22C55E' : '#4F46E5')+';border-radius:6px;font-size:11px;color:'+(p.confluencePublished ? '#22C55E' : '#4F46E5')+';background:white;cursor:pointer;display:flex;align-items:center;gap:4px;">'+(p.confluencePublished ? '✓ Update on Confluence' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> Add to Confluence')+'</button>'
          + '</div>'
        + '</div>'
        + (p.confluenceUrl
            ? '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:8px 12px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;">'
                + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>'
                + '<a href="'+h(p.confluenceUrl)+'" target="_blank" style="font-size:12px;color:#16A34A;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+h(p.confluenceUrl)+'</a>'
              + '</div>'
            : '')
        + (r.summary ? '<div style="padding:14px 16px;background:#EEF2FF;border-radius:10px;margin-bottom:24px;font-size:13px;color:#4338CA;line-height:1.6;font-weight:500;">'+r.summary+'</div>' : '')
        + renderSection('How Competitors Handle It', '🏢', r.competitorAnalysis)
        + renderSection('Common Patterns & Best Practices', '📐', r.patterns)
        + renderSection('UX & Design Approaches', '🎨', r.uxDesign)
        + renderVisualGallery()
        + renderSection('Pricing & Packaging', '💰', r.pricing)
        + renderSection('Technical Considerations', '⚙️', r.technical)
        + renderSection('Recommendations for Cludo', '🎯', r.recommendations)
        + (r.sources ? (function() {
          let srcList = r.sources;

            srcList = srcList.split('\n').map(s => s.trim()).filter(s => s.length > 0);
