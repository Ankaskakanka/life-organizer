          }
          function domainFromUrl(url) { try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url; } }
          function labelFromUrl(url) {
            const d = domainFromUrl(url);
            const path = url.replace(/https?:\/\/[^/]+/,'').replace(/\?.*/,'');
            const parts = path.split('/').filter(p => p.length > 0);
            const slug = parts.length > 0 ? parts[parts.length - 1].replace(/[-_]/g,' ').substring(0,50) : '';
            return slug ? d + ' — ' + slug : d;
          }
          return '<div style="margin-top:24px;padding-top:16px;border-top:1px solid #E5E7EB;">'
            + '<h3 style="font-size:12px;font-weight:700;color:#9CA3AF;margin:0 0 12px;">SOURCES (' + srcList.length + ')</h3>'
            + '<div style="display:flex;flex-direction:column;gap:4px;">'
            + srcList.map(function(url, i) {
              return '<a href="'+h(url)+'" target="_blank" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;text-decoration:none;font-size:11.5px;color:#4F46E5;transition:background 0.1s;" onmouseover="this.style.background=\'#EEF2FF\'" onmouseout="this.style.background=\'transparent\'">'
                + '<span style="color:#9CA3AF;font-size:10px;font-weight:600;min-width:18px;">[' + (i+1) + ']</span>'
                + '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + h(labelFromUrl(url)) + '</span>'
                + '<svg width="10" height="10" fill="none" stroke="#9CA3AF" viewBox="0 0 24 24" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>'
                + '</a>';
            }).join('')
            + '</div></div>';
        })() : '')
        + (function() {
          const fus = (r.followUps || []);
          let html = '<div style="margin-top:28px;padding-top:20px;border-top:2px solid #E5E7EB;">'
            + '<h3 style="font-size:14px;font-weight:700;color:#111827;margin:0 0 16px;display:flex;align-items:center;gap:6px;">💬 Follow-up Questions</h3>';
          if (fus.length > 0) {
            fus.forEach(function(fu, idx) {
              html += '<div style="margin-bottom:16px;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden;">'
                + '<div style="padding:10px 14px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:8px;">'
                  + '<span style="font-size:10px;font-weight:700;color:white;background:#4F46E5;border-radius:4px;padding:2px 6px;">Q'+(idx+1)+'</span>'
                  + '<span style="font-size:12.5px;font-weight:600;color:#374151;">'+h(fu.question)+'</span>'
                + '</div>';
              if (fu.answer) {
                html += '<div style="padding:12px 14px;font-size:12.5px;color:#374151;line-height:1.7;white-space:pre-wrap;">'+h(fu.answer)+'</div>';
              } else {
                html += '<div style="padding:12px 14px;font-size:12px;color:#9CA3AF;display:flex;align-items:center;gap:6px;">'
                  + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83"/></svg>'
                  + 'Researching…</div>';
              }
              html += '</div>';
            });
          }
          html += '<div style="display:flex;gap:8px;align-items:center;">'
            + '<input id="followup-input-'+p.id+'" type="text" placeholder="Ask a follow-up question about this report…" '
            + 'onkeydown="if(event.key===\'Enter\')askDiscoveryFollowUp(\''+p.id+'\')" '
            + 'style="flex:1;padding:9px 14px;border:1px solid #D1D5DB;border-radius:8px;font-size:12.5px;outline:none;transition:border-color 0.15s;" '
            + 'onfocus="this.style.borderColor=\'#4F46E5\'" onblur="this.style.borderColor=\'#D1D5DB\'">'
            + '<button id="followup-btn-'+p.id+'" onclick="askDiscoveryFollowUp(\''+p.id+'\')" '
            + 'style="padding:9px 16px;background:#4F46E5;color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">Ask</button>'
          + '</div></div>';
          return html;
        })()
      + '</div>'
    + '</div>';
  }

  function renderProjectMain(p) {
    if (p.status === 'done' && p.report) return renderReport(p);
    if (p.status === 'pending' || p.status === 'researching') return renderPendingState(p);
    return renderBriefForm(p);
  }

  return `
  <div style="display:flex;max-width:1100px;margin:0 auto;padding:0 20px;height:calc(100vh - 200px);gap:0;">
    ${renderSidebar()}
    ${activeProj ? renderProjectMain(activeProj) : renderEmptyState()}
  </div>`;
}

// ── Product Requirements Functions ────────────────────────

function createPrdProject() {
  const input = document.getElementById('prd-new-input');
  if (!input || !input.value.trim()) return;
  const proj = {
    id: 'prd_' + Date.now(),
    title: input.value.trim(),
    status: 'questionnaire', // questionnaire → generating → draft → published
    createdAt: new Date().toISOString(),
    answers: {},
    document: null,
    confluencePublished: false,
    linkedDiscoveryId: null,
    figmaUrl: '',
    images: []
  };
  if (!state.prdProjects) state.prdProjects = [];
  state.prdProjects.unshift(proj);
  state.activePrdId = proj.id;
  saveState();
  renderApp();
}

function selectPrdProject(id) {
  state.activePrdId = id;
  renderApp();
}

function deletePrdProject(id, evt) {
  if (evt) evt.stopPropagation();
  if (!confirm('Delete this PRD?')) return;
  state.prdProjects = (state.prdProjects || []).filter(p => p.id !== id);
  if (state.activePrdId === id) state.activePrdId = null;
  saveState();
  renderApp();
}

function updatePrdAnswer(field, val) {
  const proj = (state.prdProjects || []).find(p => p.id === state.activePrdId);
  if (!proj) return;
  proj.answers[field] = val;
  saveState();
}

function updatePrdField(field, val) {
  const proj = (state.prdProjects || []).find(p => p.id === state.activePrdId);
  if (!proj) return;
  proj[field] = val;
  saveState();
}

function handlePrdVisualUpload(input) {
  const proj = (state.prdProjects || []).find(p => p.id === state.activePrdId);
  if (!proj || !input.files || !input.files.length) return;
  if (!proj.visuals) proj.visuals = [];
  const files = Array.from(input.files);
  let loaded = 0;
  files.forEach(function(file) {
    if (!file.type.startsWith('image/')) return;
    if (proj.visuals.length >= 4) { alert('Maximum 4 images allowed.'); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
      proj.visuals.push({ dataUrl: e.target.result, name: file.name, type: file.type });
      loaded++;
      if (loaded === files.length) { saveState(); renderApp(); }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function removePrdVisual(index) {
  const proj = (state.prdProjects || []).find(p => p.id === state.activePrdId);
  if (!proj || !proj.visuals) return;
  proj.visuals.splice(index, 1);
  saveState();
  renderApp();
}

function linkDiscoveryToPrd() {
  const proj = (state.prdProjects || []).find(p => p.id === state.activePrdId);
  if (!proj) return;
  const sel = document.getElementById('prd-discovery-link');
  proj.linkedDiscoveryId = sel ? sel.value : null;
  saveState();
  renderApp();
}

async function generatePrdDraft(projId) {
  const proj = (state.prdProjects || []).find(p => p.id === projId);
  if (!proj) return;
  const apiKey = state.industryApiKey || '';
  if (!apiKey) { alert('Set your API key in Intelligence Chat first.'); return; }
  proj.status = 'generating';
  saveState();
  renderApp();

  const a = proj.answers;
  let discoveryContext = '';
  if (proj.linkedDiscoveryId) {
    const disc = (state.discoveryProjects || []).find(d => d.id === proj.linkedDiscoveryId);
    if (disc && disc.report) {
      const r = disc.report;
      discoveryContext = '\n\nRELATED PRODUCT DISCOVERY REPORT for "' + disc.title + '":\n'
        + (r.summary ? 'Summary: ' + r.summary + '\n' : '')
        + (r.competitorAnalysis ? 'Competitors: ' + r.competitorAnalysis.substring(0, 1500) + '\n' : '')
        + (r.patterns ? 'Patterns: ' + r.patterns.substring(0, 800) + '\n' : '')
        + (r.uxDesign ? 'UX: ' + r.uxDesign.substring(0, 800) + '\n' : '')
        + (r.pricing ? 'Pricing: ' + r.pricing.substring(0, 500) + '\n' : '')
        + (r.recommendations ? 'Recommendations: ' + r.recommendations.substring(0, 1000) + '\n' : '');
    }
  }

  const systemPrompt = 'You are a product manager writing a short, clear Product Requirements Document (PRD) for Cludo, a search-as-a-service company. Cludo products include AI Chat (set up in Experience Builder), Search, and Recommendations. Existing features include canned responses in AI Chat. Key markets: European public sector, higher education, and enterprise. EU data residency matters.\n\nIMPORTANT WRITING RULES:\n- Write like a human, not an AI. Short sentences. Plain words.\n- Never use em dashes. Use " - " (space-hyphen-space) instead.\n- No emojis anywhere in the document.\n- Use simple vocabulary - nothing beyond what a 10th grader would use.\n- Keep it short. Each section should be a few bullet points, not paragraphs.\n- Be direct. Say what you mean. No filler words or corporate jargon.\n- The whole document should fit on 2 pages printed.\n- CRITICAL FORMATTING: In every JSON field that has multiple items, separate them with the literal characters backslash-n (a newline in JSON). NEVER join list items with commas. Each user story, requirement, flow step, or criteria MUST start with "- " and be separated by \\n. Example: "- First item\\n- Second item\\n- Third item"\n\nReturn valid JSON with these fields:\n{\n  "title": "<feature name>",\n  "summary": "<1-2 sentences - what are we building and why>",\n  "problemStatement": "<what problem are we solving - why it matters now - keep it to 3-4 sentences max>",\n  "goals": "<2-3 measurable KPIs - what does success look like>",\n  "userStories": "<3-5 job stories: When [context], I want to [action], so I can [outcome]>",\n  "requirements": "<bullet list of what needs to be built for v1 - keep each item to one line>",\n  "howItWorks": "<THIS IS THE MOST IMPORTANT SECTION. Based on the PM answers about behavior and configuration, describe exactly how this feature works. Group by scenario. For each scenario, write numbered steps covering: what the user sees, what they do, what the system does, what happens next, and the end state. Also describe how the customer configures it in Experience Builder or MyCludo. Reference specific Cludo features (Experience Builder, AI Chat widget, canned responses, MyCludo dashboard, analytics). This must be detailed enough that an engineer can build it and QA can test it without asking any questions.>",\n  "userFlows": "<2-3 key flows described step by step - keep each flow to 4-6 steps>",\n  "acceptanceCriteria": "<testable criteria in Given/When/Then format - happy path + 2-3 edge cases>",\n  "outOfScope": "<bullet list of what is NOT included in v1>",\n  "technicalNotes": "<short bullet list - integrations, APIs, data residency needs>",\n  "designNotes": "<key screens needed, how it should feel to use>",\n  "decisionLog": "<3-5 key decisions made and why. What was considered and rejected. What trade-offs were accepted. Format each as: Decision: X / Why: Y / Rejected: Z>",\n  "launchPlan": "<who gets it first, rollout steps>"\n}\n\nBe specific to Cludo. Every section must reference how it fits with existing Cludo features: Experience Builder (where AI Chat is configured), AI Chat widget (the frontend), canned responses (existing feature), MyCludo dashboard (where customers manage settings), and analytics. Never write generic requirements - always say where in Cludo something happens.';

  const userPromptText = 'Write a PRD for: ' + proj.title + '\n\n'
    + 'ANSWERS FROM PM:\n'
    + 'Problem: ' + (a.problem || 'Not specified') + '\n'
    + 'Target user: ' + (a.targetUser || 'Not specified') + '\n'
    + 'How it should work (step by step behavior): ' + (a.behavior || 'Not specified') + '\n'
    + 'Which Cludo features this touches: ' + (a.cludoContext || 'Not specified') + '\n'
    + 'How customers configure it: ' + (a.configuration || 'Not specified') + '\n'
    + 'Success metrics: ' + (a.successMetrics || 'Not specified') + '\n'
    + 'Known constraints: ' + (a.constraints || 'Not specified') + '\n'
    + 'What\'s out of scope for v1: ' + (a.outOfScope || 'Not specified') + '\n'
    + 'Figma/design URL: ' + (proj.figmaUrl || 'None provided') + '\n'
    + 'Additional context: ' + (a.additionalContext || 'None')
    + discoveryContext;

  // Build message content — include uploaded visuals as vision blocks if present
  const visuals = proj.visuals || [];
  let messageContent;
  if (visuals.length > 0) {
    messageContent = [];
    visuals.forEach(function(v, i) {
      // Extract base64 data from dataUrl (strip "data:image/xxx;base64," prefix)
      const base64 = v.dataUrl.split(',')[1];
      const mediaType = v.type || 'image/png';
      messageContent.push({
        type: 'image',
        source: { type: 'base64', media_type: mediaType, data: base64 }
      });
    });
    messageContent.push({
      type: 'text',
      text: (visuals.length === 1
        ? 'I have attached 1 visual (screenshot/wireframe/mockup) above. Use it to inform your requirements — describe relevant UI details, flows, or components you can see in the Design Notes and How It Works sections.\n\n'
        : 'I have attached ' + visuals.length + ' visuals (screenshots/wireframes/mockups) above. Use them to inform your requirements — describe relevant UI details, flows, or components you can see in the Design Notes and How It Works sections.\n\n')
        + userPromptText
    });
  } else {
    messageContent = userPromptText;
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4096, system: systemPrompt, messages: [{ role: 'user', content: messageContent }] })
    });
    if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error((err.error && err.error.message) || 'API error ' + response.status); }
    const data = await response.json();
    const text = data.content[0].text;
    let doc;
    try { doc = JSON.parse(text); } catch(e) {
      const m = text.match(/\{[\s\S]*\}/);
      if (m) doc = JSON.parse(m[0]); else throw new Error('Could not parse response');
    }
    doc.generatedAt = new Date().toISOString();
    proj.document = doc;
    proj.status = 'draft';
  } catch(err) {
    proj.status = 'questionnaire';
    alert('Generation failed: ' + err.message);
  }
  saveState();
  renderApp();
}

async function revisePrdSection(projId, sectionKey) {
  const proj = (state.prdProjects || []).find(p => p.id === projId);
  if (!proj || !proj.document) return;
  const input = document.getElementById('prd-revise-input-' + sectionKey);
  if (!input || !input.value.trim()) return;
  const instruction = input.value.trim();
  const apiKey = state.industryApiKey || '';
  if (!apiKey) { alert('Set your API key in Intelligence Chat first.'); return; }
  input.value = '';
  const btn = document.getElementById('prd-revise-btn-' + sectionKey);
  if (btn) { btn.disabled = true; btn.textContent = 'Revising…'; }

  const currentContent = proj.document[sectionKey] || '';
  const systemPrompt = 'You are editing a section of a Product Requirements Document for Cludo. Return ONLY the revised section text - no JSON wrapping, no section title, just the updated content.\n\nWriting rules:\n- Write like a human, not AI. Short sentences. Plain words.\n- Never use em dashes. Use " - " instead.\n- No emojis.\n- Simple vocabulary - nothing beyond what a 10th grader would use.\n- Be direct. No filler or jargon.\n- Keep it short.\n- If the section has multiple items, put each on its own line starting with "- ". Never comma-separate list items.';
  const userPrompt = 'SECTION: ' + sectionKey + '\n\nCURRENT CONTENT:\n' + currentContent + '\n\nINSTRUCTION:\n' + instruction + '\n\nReturn only the revised section text.';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 2048, system: systemPrompt, messages: [{ role: 'user', content: userPrompt }] })
    });
    if (!response.ok) { const err = await response.json().catch(() => ({})); throw new Error((err.error && err.error.message) || 'API error ' + response.status); }
    const data = await response.json();
    proj.document[sectionKey] = data.content[0].text;
  } catch(err) {
    alert('Revision failed: ' + err.message);
  }
  if (btn) { btn.disabled = false; btn.textContent = 'Revise'; }
  saveState();
  renderApp();
}

function copyPrdForClaude(projId) {
  const proj = (state.prdProjects || []).find(p => p.id === projId);
  if (!proj || !proj.document) { alert('No draft to copy yet — generate the PRD first.'); return; }
  const d = proj.document;
  const sections = [
    ['Summary', d.summary], ['Problem Statement', d.problemStatement],
    ['Goals & Success Metrics', d.goals], ['User Stories', d.userStories],
    ['Functional Requirements', d.requirements], ['How It Works', d.howItWorks],
    ['User Flows', d.userFlows], ['Acceptance Criteria', d.acceptanceCriteria],
    ['Out of Scope', d.outOfScope], ['Technical Notes', d.technicalNotes],
    ['Design Notes', d.designNotes], ['Decision Log', d.decisionLog], ['Launch Plan', d.launchPlan]
  ];

function mdToConfluenceStorage(md) {
  // Convert basic markdown to Confluence storage format (XHTML)
  var html = '';
  var lines = md.split('\n');
  var inList = false;
  lines.forEach(function(line) {
    var h1 = line.match(/^# (.+)/);
    var h2 = line.match(/^## (.+)/);
    var h3 = line.match(/^### (.+)/);
    var li = line.match(/^[-*] (.+)/);
    var bold = line.match(/^\*\*(.+)\*\*$/);
    var hr = line.match(/^---/);
    if (h1) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<h1>' + h1[1] + '</h1>';
    } else if (h2) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<h2>' + h2[1] + '</h2>';
    } else if (h3) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<h3>' + h3[1] + '</h3>';
    } else if (li) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + li[1] + '</li>';
    } else if (hr) {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<hr/>';
    } else if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      // inline bold
      var processed = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html += '<p>' + processed + '</p>';
    }
  });
  if (inList) html += '</ul>';
  return html;
}

  const proj = (state.prdProjects || []).find(p => p.id === projId);
  if (!proj || !proj.document) return;
  const d = proj.document;
  const btn = document.getElementById('prd-confluence-btn-' + projId);
  if (btn) { btn.disabled = true; btn.innerHTML = 'Publishing…'; }

  const sections = [
    ['Summary', d.summary],
    ['Problem Statement', d.problemStatement],
    ['Goals & Success Metrics', d.goals],
    ['User Stories', d.userStories],
    ['Functional Requirements', d.requirements],
    ['How It Works', d.howItWorks],
    ['User Flows', d.userFlows],
    ['Acceptance Criteria', d.acceptanceCriteria],
    ['Out of Scope', d.outOfScope],
    ['Technical Notes', d.technicalNotes],
    ['Design Notes', d.designNotes],
    ['Decision Log', d.decisionLog],
    ['Launch Plan', d.launchPlan]
  ];
  let md = '# PRD: ' + (d.title || proj.title) + '\n\n';
  if (proj.figmaUrl) md += '**Figma:** ' + proj.figmaUrl + '\n\n';
  sections.forEach(function(s) { if (s[1]) md += '## ' + s[0] + '\n\n' + s[1] + '\n\n'; });
  md += '---\n*Generated: ' + new Date(d.generatedAt || Date.now()).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'}) + ' · Published from Product Hub*\n';

  const pageTitle = 'PRD: ' + (d.title || proj.title) + ' (' + new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) + ')';

  proj.confluencePublished = true;
  proj.confluencePublishedAt = new Date().toISOString();
  proj.status = 'published';
  // Queue for the scheduled task to pick up and publish, then write the URL back
  if (!state.confluencePublishQueue) state.confluencePublishQueue = [];
  state.confluencePublishQueue = state.confluencePublishQueue.filter(q => q.projId !== projId);
  state.confluencePublishQueue.push({ projId, type: 'prd', title: pageTitle, body: md, spaceKey: 'PROD', status: 'pending', requestedAt: new Date().toISOString() });
  saveState();
  await saveFile(); // write queue to disk so the scheduled task can pick it up
  if (btn) {
    btn.innerHTML = '✓ Queued — publishing…';
    btn.style.background = '#22C55E'; btn.style.borderColor = '#22C55E'; btn.style.color = 'white';
    setTimeout(function() { btn.innerHTML = '✓ Update on Confluence'; btn.style.background = 'white'; btn.style.borderColor = '#22C55E'; btn.style.color = '#22C55E'; btn.disabled = false; }, 2500);
  }
  renderApp();
}

function formatPrdContent(text) {
  if (!text) return '';
  var lines;
  if (text.indexOf('\n') !== -1) {
    lines = text.split('\n');
  } else {
    // No newlines - try to detect comma-separated list items
    // Split on comma followed by a capital letter (with optional space)
    var parts = text.split(/,(?=\s*[A-Z])/);
    if (parts.length >= 3) {
      lines = parts;
    } else {
      // Not a list - just a paragraph
      return '<p style="margin:0;">' + h(text) + '</p>';
    }
  }
  lines = lines.map(function(l) { return l.trim().replace(/^[-*•]\s*/, '').replace(/^\d+[\.\)]\s*/, ''); }).filter(function(l) { return l.length > 0; });
  if (lines.length <= 1) return '<p style="margin:0;">' + h(lines[0] || text) + '</p>';
  return '<ul style="margin:0;padding-left:20px;list-style:disc;">'
    + lines.map(function(l) { return '<li style="margin-bottom:6px;">' + h(l) + '</li>'; }).join('')
    + '</ul>';
}

            + '<h3 style="font-size:13px;font-weight:700;color:#111827;margin:0;">Feedback Themes</h3>'
            + '<span style="font-size:11px;color:#9CA3AF;">Grouped by topic</span>'
            + (clusters.length > 0 ? '<span style="margin-left:auto;font-size:11px;font-weight:600;color:#4F46E5;background:#EEF2FF;padding:2px 8px;border-radius:999px;">' + clusters.length + ' themes &middot; ' + clusters.reduce(function(sum,c){return sum+c.mentions},0) + ' mentions</span>' : '')
          + '</div>'
          + (clusters.length === 0
            ? '<div style="padding:32px 20px;background:white;border:1px solid #EAECF0;border-radius:10px;text-align:center;">'
                + '<p style="color:#9CA3AF;font-size:12px;margin:0;">Themes will appear here once the digest runs.</p>'
              + '</div>'
            : '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'
              + clusters.map(function(c, cIdx) {
                var sentimentIcon = c.sentiment === 'negative' ? '🔴' : c.sentiment === 'mixed' ? '🟡' : '🟢';
                return '<div onclick="openFeedbackDetailModal(\'cluster\',' + cIdx + ')" style="padding:14px 16px;background:white;border:1px solid #EAECF0;border-radius:10px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;" onmouseover="this.style.borderColor=\'#C7D2FE\';this.style.boxShadow=\'0 2px 8px rgba(99,102,241,0.08)\'" onmouseout="this.style.borderColor=\'#EAECF0\';this.style.boxShadow=\'none\'">'
                  + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'
                    + '<span style="font-size:13px;font-weight:700;color:#111827;">' + c.theme + '</span>'
                    + '<span style="font-size:10px;">' + sentimentIcon + '</span>'
                  + '</div>'
                  + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'
                    + '<span style="font-size:20px;font-weight:800;color:#4F46E5;">' + c.mentions + '</span>'
                    + '<span style="font-size:11px;color:#9CA3AF;">mentions</span>'
                    + (c.customers ? '<span style="font-size:11px;color:#9CA3AF;margin-left:auto;">' + c.customers + ' customers</span>' : '')
                  + '</div>'
                  + '<div style="font-size:11px;color:#6B7280;line-height:1.4;">' + c.summary + '</div>'
                  + '<div style="display:flex;align-items:center;gap:4px;margin-top:8px;flex-wrap:wrap;">'
                    + (c.sources || []).map(function(src) { return '<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:#F3F4F6;color:#6B7280;">' + src + '</span>'; }).join('')
                    + '<span style="margin-left:auto;font-size:10px;color:#9CA3AF;display:flex;align-items:center;gap:3px;">' + (c.items||[]).length + ' items <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></span>'
                  + '</div>'
                + '</div>';
              }).join('')
            + '</div>')
        + '</div>'

        // ── TRENDING SIGNALS ──
        + '<div style="margin-bottom:28px;">'
          + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">'
            + '<div style="width:8px;height:8px;border-radius:50%;background:#F59E0B;"></div>'
            + '<h3 style="font-size:13px;font-weight:700;color:#111827;margin:0;">Trending Signals</h3>'
            + '<span style="font-size:11px;color:#9CA3AF;">Changes vs. previous period</span>'
            + (trending.length > 0 ? '<span style="margin-left:auto;font-size:11px;font-weight:600;color:#F59E0B;background:#FFFBEB;padding:2px 8px;border-radius:999px;">' + trending.filter(function(t){return t.direction==="up"}).length + ' rising</span>' : '')
          + '</div>'
          + (trending.length === 0
            ? '<div style="padding:32px 20px;background:white;border:1px solid #EAECF0;border-radius:10px;text-align:center;">'
                + '<p style="color:#9CA3AF;font-size:12px;margin:0;">Trending signals will show after at least two digest runs.</p>'
              + '</div>'
            : '<div style="background:white;border:1px solid #EAECF0;border-radius:10px;overflow:hidden;">'
              + trending.map(function(t, i) {
                var arrow = t.direction === 'up' ? '<span style="color:#EF4444;font-weight:700;">&#9650;</span>' : '<span style="color:#22C55E;font-weight:700;">&#9660;</span>';
                var borderTop = i > 0 ? 'border-top:1px solid #F3F4F6;' : '';
                return '<div onclick="openFeedbackDetailModal(\'trending\',' + i + ')" style="padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s;' + borderTop + '" onmouseover="this.style.background=\'#F9FAFB\'" onmouseout="this.style.background=\'transparent\'">'
                  + arrow
                  + '<div style="flex:1;">'
                    + '<span style="font-size:12px;font-weight:600;color:#111827;">' + t.theme + '</span>'
                    + '<span style="font-size:11px;color:#9CA3AF;margin-left:8px;">' + t.change + '</span>'
                  + '</div>'
                  + '<span style="font-size:11px;color:#6B7280;margin-right:4px;">' + t.mentions + ' mentions</span>'
                  + '<svg width="12" height="12" fill="none" stroke="#9CA3AF" viewBox="0 0 24 24" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>'
                + '</div>';
              }).join('')
            + '</div>')
        + '</div>'

      + '</div>'
    + '</div>'

    // ── RIGHT PANEL: RECOMMENDATIONS ──
    + (function() {
      var recs = (digest && digest.recommendations) || [];
      var dismissed = state.dismissedFeedbackRecs || [];
      var visible = recs.filter(function(r) { return !dismissed.includes(r.id); });
      var dismissedCount = recs.length - visible.length;

      var priorityWeight = { 'critical': 0, 'high': 1, 'medium': 2, 'low': 3 };
      visible.sort(function(a, b) {
        var wa = priorityWeight.hasOwnProperty(a.priority) ? priorityWeight[a.priority] : 99;
        var wb = priorityWeight.hasOwnProperty(b.priority) ? priorityWeight[b.priority] : 99;
        return wa - wb;
      });

      var priorityStyles = {
        critical: { accent: '#EF4444', bg: '#FEF2F2', color: '#DC2626', label: 'CRITICAL', dot: '#EF4444' },
        high:     { accent: '#F59E0B', bg: '#FFFBEB', color: '#D97706', label: 'HIGH',     dot: '#F59E0B' },
        medium:   { accent: '#4F46E5', bg: '#EEF2FF', color: '#4F46E5', label: 'MEDIUM',   dot: '#4F46E5' },
        low:      { accent: '#6B7280', bg: '#F9FAFB', color: '#6B7280', label: 'LOW',       dot: '#9CA3AF' }
      };

      var criticalCount = visible.filter(function(r){return r.priority==='critical'}).length;
      var highCount = visible.filter(function(r){return r.priority==='high'}).length;

      return '<div style="width:360px;min-width:360px;border-left:1px solid #EAECF0;display:flex;flex-direction:column;background:#FAFBFC;">'

        // Header
        + '<div style="padding:16px 18px 14px;background:white;border-bottom:1px solid #EAECF0;">'
          + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'
            + '<div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#4F46E5,#7C3AED);display:flex;align-items:center;justify-content:center;">'
              + '<svg width="14" height="14" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>'
            + '</div>'
            + '<div>'
              + '<div style="font-size:13px;font-weight:700;color:#111827;">Recommended Actions</div>'
              + '<div style="font-size:10px;color:#9CA3AF;">Based on feedback analysis</div>'
            + '</div>'
          + '</div>'
          + '<div style="display:flex;gap:6px;margin-top:8px;">'
            + (criticalCount > 0 ? '<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;background:#FEF2F2;color:#DC2626;">' + criticalCount + ' critical</span>' : '')
            + (highCount > 0 ? '<span style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;background:#FFFBEB;color:#D97706;">' + highCount + ' high</span>' : '')
            + '<span style="font-size:10px;font-weight:500;padding:3px 8px;border-radius:999px;background:#F3F4F6;color:#6B7280;">' + visible.length + ' total</span>'
          + '</div>'
        + '</div>'

        // Recommendations list
        + '<div style="padding:10px 12px;flex:1;overflow-y:auto;">'
          + (visible.length === 0
            ? '<div style="padding:48px 16px;text-align:center;">'
                + '<div style="width:48px;height:48px;border-radius:50%;background:#F0FDF4;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px;">✅</div>'
                + '<p style="font-size:13px;font-weight:600;color:#111827;margin:0 0 4px;">All caught up!</p>'
                + '<p style="font-size:11px;color:#9CA3AF;margin:0;">No pending recommendations.</p>'
              + '</div>'
            : visible.map(function(rec, idx) {
              var ps = priorityStyles[rec.priority] || priorityStyles.medium;
              return '<div style="margin-bottom:8px;background:white;border:1px solid #EAECF0;border-radius:10px;border-left:3px solid ' + ps.accent + ';overflow:hidden;transition:border-color 0.15s,box-shadow 0.15s;" onmouseover="this.style.boxShadow=\'0 3px 12px rgba(0,0,0,0.06)\'" onmouseout="this.style.boxShadow=\'none\'">'

                // Top: number + priority + icon
                + '<div style="padding:10px 12px 0;">'
                  + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px;">'
                    + '<span style="width:20px;height:20px;border-radius:6px;background:' + ps.bg + ';color:' + ps.color + ';font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;">' + (idx + 1) + '</span>'
                    + '<span style="font-size:8.5px;font-weight:700;letter-spacing:0.06em;color:' + ps.color + ';">' + ps.label + '</span>'
                    + '<span style="margin-left:auto;font-size:14px;line-height:1;">' + rec.icon + '</span>'
                  + '</div>'

                  // Title
                  + '<div style="font-size:12px;font-weight:700;color:#111827;line-height:1.4;margin-bottom:4px;">' + rec.title + '</div>'

                  // Description (truncated)
                  + '<div style="font-size:10.5px;color:#6B7280;line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">' + rec.description + '</div>'

                  // Based on tag
                  + '<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;">'
                    + '<span style="width:4px;height:4px;border-radius:50%;background:' + ps.dot + ';flex-shrink:0;"></span>'
                    + '<span style="font-size:9.5px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + rec.basedOn.split('—')[0].trim() + '</span>'
                  + '</div>'
                + '</div>'

                // Action buttons
                + '<div style="display:flex;border-top:1px solid #F3F4F6;">'
                  + '<button onclick="event.stopPropagation();addFeedbackRecAsTask(\'' + rec.id + '\')" style="flex:1;padding:8px;background:none;color:#4F46E5;border:none;border-right:1px solid #F3F4F6;font-size:10.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background 0.12s;" onmouseover="this.style.background=\'#EEF2FF\'" onmouseout="this.style.background=\'none\'">'
                    + '<svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>'
                    + 'Add as task'
                  + '</button>'
                  + '<button onclick="event.stopPropagation();dismissFeedbackRec(\'' + rec.id + '\')" style="padding:8px 14px;background:none;color:#C0C5CE;border:none;font-size:10.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background 0.12s,color 0.12s;" onmouseover="this.style.background=\'#FEF2F2\';this.style.color=\'#9CA3AF\'" onmouseout="this.style.background=\'none\';this.style.color=\'#C0C5CE\'">'
                    + '<svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>'
                  + '</button>'
                + '</div>'

              + '</div>';
            }).join(''))

          // Dismissed count + restore
          + (dismissedCount > 0
            ? '<div style="padding:10px 8px;display:flex;align-items:center;justify-content:center;gap:6px;border-top:1px solid #F3F4F6;margin-top:2px;">'
                + '<svg width="12" height="12" fill="none" stroke="#9CA3AF" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>'
                + '<span style="font-size:10.5px;color:#9CA3AF;">' + dismissedCount + ' dismissed</span>'
                + '<button onclick="restoreDismissedFeedbackRecs()" style="font-size:10.5px;color:#4F46E5;background:none;border:none;cursor:pointer;font-weight:600;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'">Restore</button>'
              + '</div>'
            : '')
        + '</div>'

      + '</div>';
    })()

  + '</div>';
}

// ── Feedback Detail Modal ──
function openFeedbackDetailModal(type, index) {
  var digest = state.feedbackDigest || {};
  var item = null;
  var sectionLabel = '';
  var accentColor = '#4F46E5';

  if (type === 'problem') {
    item = (digest.problems || [])[index];
    sectionLabel = 'Needs Improvement';
    accentColor = '#EF4444';
  } else if (type === 'cluster') {
    item = (digest.clusters || [])[index];
    sectionLabel = 'Feedback Theme';
    accentColor = '#4F46E5';
  } else if (type === 'trending') {
    item = (digest.trending || [])[index];
    sectionLabel = '#F59E0B';
    accentColor = '#F59E0B';
    sectionLabel = 'Trending Signal';
  } else if (type === 'biggestPain') {
    item = digest.biggestPain ? { theme: digest.biggestPain.theme, summary: digest.biggestPain.mentions + ' mentions from ' + digest.biggestPain.customers + ' customers', items: (digest.problems || []).filter(function(p){return p.theme.indexOf(digest.biggestPain.theme.split(' ')[0])!==-1})[0]?.items || [] } : null;
    sectionLabel = 'Biggest Pain';
    accentColor = '#EF4444';
  } else if (type === 'gettingWorse') {
    item = digest.gettingWorse ? { theme: digest.gettingWorse.theme, summary: digest.gettingWorse.change, items: (digest.trending || []).filter(function(t){return t.direction==='up'})[0]?.items || [] } : null;
    sectionLabel = 'Getting Worse';
    accentColor = '#F59E0B';
  } else if (type === 'needsAttention') {
    var custName = digest.needsAttention ? digest.needsAttention.customer : '';
    var custItems = [];
    (digest.problems || []).forEach(function(p){ (p.items||[]).forEach(function(it){ if(it.customer===custName) custItems.push(it); }); });
    (digest.clusters || []).forEach(function(c){ (c.items||[]).forEach(function(it){ if(it.customer===custName) custItems.push(it); }); });
    item = digest.needsAttention ? { theme: custName, summary: digest.needsAttention.openItems + ' open items across sources', items: custItems } : null;
    sectionLabel = 'Needs Attention';
    accentColor = '#8B5CF6';
  } else if (type === 'unanswered') {
    var unItems = [];
    (digest.problems || []).forEach(function(p){ (p.items||[]).slice(0, 2).forEach(function(it){ unItems.push(it); }); });
    item = { theme: 'Unanswered Threads', summary: (digest.unanswered || 0) + ' threads with no product response yet', items: unItems.slice(0, digest.unanswered || 6) };
    sectionLabel = 'Unanswered';
    accentColor = '#6366F1';
  }

  if (!item) return;

  var old = document.getElementById('feedbackDetailModal');
  if (old) old.remove();

  var items = item.items || [];
  var severityColor = item.severity === 'high' ? '#EF4444' : item.severity === 'medium' ? '#F59E0B' : '#6B7280';

  var sourceIcons = { '#ask-product': '💬', '#ask-support': '💬', '#ask-product-submit-change-request': '💬', '#product-feedback': '💬', '#customer-updates': '💬', '#glen-product-feedback': '💬', '#glen-reviews': '💬', 'Zendesk': '🎫', 'Gong': '🎙' };

  var itemsHtml = items.length > 0
    ? items.map(function(it, idx) {
        var icon = sourceIcons[it.source] || '📌';
        var borderTop = idx > 0 ? 'border-top:1px solid #F3F4F6;' : '';
        return '<div style="padding:14px 16px;' + borderTop + 'display:flex;gap:12px;align-items:flex-start;" onmouseover="this.style.background=\'#F9FAFB\'" onmouseout="this.style.background=\'transparent\'">'
          + '<div style="flex-shrink:0;width:32px;height:32px;border-radius:8px;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:14px;">' + icon + '</div>'
          + '<div style="flex:1;min-width:0;">'
            + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">'
              + '<span style="font-size:12.5px;font-weight:700;color:#111827;">' + (it.customer || 'Unknown') + '</span>'
              + '<span style="font-size:10px;padding:2px 7px;border-radius:4px;background:#F3F4F6;color:#6B7280;">' + it.source + '</span>'
              + '<span style="font-size:10.5px;color:#9CA3AF;margin-left:auto;flex-shrink:0;">' + (it.date || '') + '</span>'
            + '</div>'
            + '<div style="font-size:12px;color:#4B5563;line-height:1.5;">"' + (it.quote || '') + '"</div>'
            + (it.link ? '<a href="' + it.link + '" target="_blank" style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:11px;color:' + accentColor + ';text-decoration:none;font-weight:600;" onmouseover="this.style.textDecoration=\'underline\'" onmouseout="this.style.textDecoration=\'none\'"><svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>View in source</a>' : '')
          + '</div>'
        + '</div>';
      }).join('')
    : '<div style="padding:32px 20px;text-align:center;color:#9CA3AF;font-size:12px;">No individual mentions available yet.</div>';

  var el = document.createElement('div');
  el.id = 'feedbackDetailModal';
  el.style.cssText = 'position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;';
  el.innerHTML = '<div onclick="document.getElementById(\'feedbackDetailModal\').remove()" style="position:absolute;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);"></div>'
    + '<div class="modal-scroll" style="position:relative;background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.2);width:100%;max-width:640px;max-height:85vh;display:flex;flex-direction:column;">'

      // Header
      + '<div style="padding:20px 24px 16px;border-bottom:1px solid #EAECF0;flex-shrink:0;">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'
          + '<span style="font-size:10px;font-weight:600;color:' + accentColor + ';text-transform:uppercase;letter-spacing:0.05em;padding:3px 10px;border-radius:999px;background:' + accentColor + '15;">' + sectionLabel + '</span>'
          + '<button onclick="document.getElementById(\'feedbackDetailModal\').remove()" style="border:none;background:transparent;cursor:pointer;color:#9CA3AF;padding:4px;"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>'
        + '</div>'
        + '<h2 style="font-size:17px;font-weight:800;color:#111827;margin:0 0 6px;">' + (item.theme || '') + '</h2>'
        + (item.summary ? '<p style="font-size:12.5px;color:#6B7280;line-height:1.5;margin:0;">' + item.summary + '</p>' : '')
        + '<div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">'
          + (item.mentions !== undefined ? '<span style="font-size:11.5px;font-weight:600;color:#374151;background:#F3F4F6;padding:4px 10px;border-radius:6px;">' + item.mentions + ' mentions</span>' : '')
          + (item.customers ? '<span style="font-size:11.5px;font-weight:600;color:#374151;background:#F3F4F6;padding:4px 10px;border-radius:6px;">' + item.customers + ' customers</span>' : '')
          + (item.severity ? '<span style="font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:6px;background:' + severityColor + '15;color:' + severityColor + ';">' + item.severity + ' severity</span>' : '')
          + (item.direction ? '<span style="font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:6px;background:' + (item.direction==='up'?'#FEF2F2':'#F0FDF4') + ';color:' + (item.direction==='up'?'#EF4444':'#22C55E') + ';">' + (item.direction==='up'?'▲ Trending up':'▼ Trending down') + '</span>' : '')
          + ((item.sources||[]).length > 0 ? (item.sources||[]).map(function(s){return '<span style="font-size:10px;padding:3px 8px;border-radius:4px;background:#F3F4F6;color:#6B7280;">' + s + '</span>';}).join('') : '')
        + '</div>'
      + '</div>'

      // Mentions list
      + '<div style="padding:4px 0;overflow-y:auto;flex:1;">'
        + '<div style="padding:10px 24px 6px;"><span style="font-size:11px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.05em;">Individual mentions (' + items.length + ')</span></div>'
        + itemsHtml
      + '</div>'

    + '</div>';
  document.body.appendChild(el);
}

// Placeholder for refresh action
function refreshFeedbackDigest() {
  alert('Digest refresh will be wired up once we connect the data pipeline. This will pull from all 9 sources and cluster the results.');
}

function addFeedbackRecAsTask(recId) {
  var digest = state.feedbackDigest || {};
  var recs = digest.recommendations || [];
  var rec = recs.find(function(r) { return r.id === recId; });
  if (!rec || !rec.taskSuggestion) return;
  var ts = rec.taskSuggestion;
  addTask({
    title: ts.title,
    priority: ts.priority || 'medium',
    category: ts.category || '',
    subcategory: ts.subcategory || '',
    notes: ts.notes || '',
    status: 'todo'
  });
  // Auto-dismiss after adding
  if (!state.dismissedFeedbackRecs.includes(recId)) {
    state.dismissedFeedbackRecs.push(recId);
  }
  saveState();
  renderApp();
}

function dismissFeedbackRec(recId) {
  if (!state.dismissedFeedbackRecs.includes(recId)) {
    state.dismissedFeedbackRecs.push(recId);
    saveState();
    renderApp();
  }

  state.dismissedFeedbackRecs = [];
  saveState();
  renderApp();
}

      if (!content) return;
      html += '<div style="margin-bottom:24px;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden;">'
        + '<div style="padding:12px 16px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;">'
          + '<h3 style="font-size:13px;font-weight:700;color:#111827;margin:0;">'+sec.title+'</h3>'
        + '</div>'

        + '<div style="padding:8px 12px;border-top:1px solid #F3F4F6;display:flex;gap:6px;align-items:center;background:#FAFAFA;">'
          + '<input id="prd-revise-input-'+sec.key+'" type="text" placeholder="Tell me how to change this section…" onkeydown="if(event.key===\'Enter\')revisePrdSection(\''+p.id+'\',\''+sec.key+'\')" style="flex:1;padding:6px 10px;border:1px solid #E5E7EB;border-radius:6px;font-size:11.5px;outline:none;" onfocus="this.style.borderColor=\'#4F46E5\'" onblur="this.style.borderColor=\'#E5E7EB\'">'
          + '<button id="prd-revise-btn-'+sec.key+'" onclick="revisePrdSection(\''+p.id+'\',\''+sec.key+'\')" style="padding:5px 12px;background:#4F46E5;color:white;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;">Revise</button>'
        + '</div>'
      + '</div>';
    });

    html += '</div></div>';
    return html;
  }

  function renderProjectMain(p) {
    if (p.status === 'generating') return renderGenerating(p);
    if ((p.status === 'draft' || p.status === 'published') && p.document) return renderDraft(p);
    return renderQuestionnaire(p);
  }

  return '<div style="display:flex;max-width:1100px;margin:0 auto;padding:0 20px;height:calc(100vh - 200px);gap:0;">'
    + renderSidebar()
    + (activeProj ? renderProjectMain(activeProj) : renderEmptyState())
  + '</div>';
}

function renderDailyFocus() {

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = `${DAY_NAMES[today.getDay()]}, ${MONTH_NAMES[today.getMonth()]} ${today.getDate()}`;

  const HOUR_H    = 30;   // px per hour
  const START_H   = 9;    // 9 am
  const END_H     = 17;   // 5 pm
  const hours = Array.from({length: END_H - START_H}, (_, i) => START_H + i);

  const nowDecimal = today.getHours() + today.getMinutes() / 60;
  const nowTop = (nowDecimal >= START_H && nowDecimal <= END_H)
    ? ((nowDecimal - START_H) / (END_H - START_H)) * ((END_H - START_H) * HOUR_H)
    : -1;

  function timeToTop(t) {
    const [hh, mm] = t.split(':').map(Number);
    return (hh + mm / 60 - START_H) * HOUR_H;
  }
  function timeDuration(s, e) {
    const [sh, sm] = s.split(':').map(Number);
    const [eh, em] = e.split(':').map(Number);
    return Math.max(((eh + em / 60) - (sh + sm / 60)) * HOUR_H, 16);

function getFilteredTasks() {
  const f = state.filters;
  return state.tasks.filter(t => {
    if (f.status !== 'all' && t.status !== f.status) return false;
    if (f.category !== 'all' && t.category !== f.category) return false;
    if (f.subcategory !== 'all' && t.subcategory !== f.subcategory) return false;
    if (f.priority !== 'all' && t.priority !== f.priority) return false;
    if (f.search) {
      const s = f.search.toLowerCase();
      if (!t.title.toLowerCase().includes(s) && !(t.notes||'').toLowerCase().includes(s)) return false;
    }
    return true;
  });
}

function sortTasks(tasks) {
  const po = { urgent:0, high:1, medium:2, low:3 };
  const so = { inprogress:0, todo:1, delegate:2, done:3 };
  return [...tasks].sort((a,b) => {
    if (a.status==='done' && b.status!=='done') return 1;
    if (a.status!=='done' && b.status==='done') return -1;
    const pd = (po[a.priority]||2) - (po[b.priority]||2);
    if (pd !== 0) return pd;
    return (so[a.status]||0) - (so[b.status]||0);
  });
}

function getStats() {
  return {
    all: state.tasks.length,
    todo: state.tasks.filter(t=>t.status==='todo').length,
    inprogress: state.tasks.filter(t=>t.status==='inprogress').length,
    done: state.tasks.filter(t=>t.status==='done').length,
    delegate: state.tasks.filter(t=>t.status==='delegate').length
  };
}

// ── Helpers ───────────────────────────────────────────────
function h(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function safeId(str) { return String(str||'').replace(/[^a-zA-Z0-9]/g,'_'); }

// ── Jira helpers ─────────────────────────────────────────
function jiraKey(ticket) {
  if (!ticket) return '';
  if (ticket.startsWith('http')) {
    const m = ticket.match(/browse\/([A-Z]+-\d+)/i);
    return m ? m[1].toUpperCase() : ticket.split('/').pop();
  }
  return ticket.toUpperCase();
}
function jiraUrl(ticket) {
  if (!ticket) return '';
  if (ticket.startsWith('http')) return ticket;
  return `https://cludosearch.atlassian.net/browse/${ticket.toUpperCase()}`;
}

// ── Drag & Drop ───────────────────────────────────────────
let _dragId       = null;
let _dragOverId   = null;
let _dragOverPos  = null; // 'before' | 'after'

function dragStart(e, id) {
  _dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`[data-task-id="${id}"]`);
    if (el) el.classList.add('task-dragging');
  }, 0);
}

function dragOver(e, id) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => {
    el.classList.remove('drag-over-before','drag-over-after');
  });
  if (id === _dragId) return;
  const el = document.querySelector(`[data-task-id="${id}"]`);
  if (!el) return;
  const rect = el.getBoundingClientRect();
  _dragOverId  = id;
  _dragOverPos = e.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
  el.classList.add(_dragOverPos === 'before' ? 'drag-over-before' : 'drag-over-after');
}

function drop(e, targetId) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => {
    el.classList.remove('drag-over-before','drag-over-after');
  });
  if (!_dragId || _dragId === targetId) { dragEnd(); return; }

  const fromIdx   = state.tasks.findIndex(t => t.id === _dragId);
  const targetTask = state.tasks.find(t => t.id === targetId);
  if (fromIdx === -1 || !targetTask) { dragEnd(); return; }

  // If crossing into a different category or subcategory, adopt those values
  if (state.tasks[fromIdx].category !== targetTask.category ||
      state.tasks[fromIdx].subcategory !== targetTask.subcategory) {
    state.tasks[fromIdx].category    = targetTask.category;
    state.tasks[fromIdx].subcategory = targetTask.subcategory || '';
  }
  const [removed] = state.tasks.splice(fromIdx, 1);
  const insertAt   = state.tasks.findIndex(t => t.id === targetId);
  state.tasks.splice(_dragOverPos === 'after' ? insertAt + 1 : insertAt, 0, removed);

  _dragId = null; _dragOverId = null; _dragOverPos = null;
  saveState();
  renderApp();
}

// Drop onto an empty category section (or section header)
function dropOnSection(e, catName) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => {
    el.classList.remove('drag-over-before','drag-over-after');
  });
  if (!_dragId) { dragEnd(); return; }
  const fromIdx = state.tasks.findIndex(t => t.id === _dragId);
  if (fromIdx === -1) { dragEnd(); return; }
  state.tasks[fromIdx].category    = catName;
  state.tasks[fromIdx].subcategory = '';
  const [removed] = state.tasks.splice(fromIdx, 1);
  // Insert after the last task currently in this category
  let insertAt = state.tasks.length;
  for (let i = state.tasks.length - 1; i >= 0; i--) {
    if (state.tasks[i].category === catName) { insertAt = i + 1; break; }
  }
  state.tasks.splice(insertAt, 0, removed);
  _dragId = null; _dragOverId = null; _dragOverPos = null;
  saveState();
  renderApp();
}

// Drop onto a subcategory section header or empty subcategory zone
function dropOnSubsection(e, catName, subcatName) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.drag-over-before,.drag-over-after').forEach(el => {
    el.classList.remove('drag-over-before','drag-over-after');
  });
  if (!_dragId) { dragEnd(); return; }
  const fromIdx = state.tasks.findIndex(t => t.id === _dragId);
  if (fromIdx === -1) { dragEnd(); return; }
  state.tasks[fromIdx].category    = catName;
  state.tasks[fromIdx].subcategory = subcatName;
  const [removed] = state.tasks.splice(fromIdx, 1);
  // Insert after the last task in this exact subcategory
  let insertAt = -1;
  for (let i = state.tasks.length - 1; i >= 0; i--) {
    if (state.tasks[i].category === catName && state.tasks[i].subcategory === subcatName) {
      insertAt = i + 1; break;
    }
  }
  // Fall back: insert after the last task in this category
  if (insertAt === -1) {
    for (let i = state.tasks.length - 1; i >= 0; i--) {
      if (state.tasks[i].category === catName) { insertAt = i + 1; break; }
    }
  }
  if (insertAt === -1) insertAt = state.tasks.length;
  state.tasks.splice(insertAt, 0, removed);
  _dragId = null; _dragOverId = null; _dragOverPos = null;
  saveState();
  renderApp();
}

function dragEnd() {
  document.querySelectorAll('.task-dragging,.drag-over-before,.drag-over-after').forEach(el => {
    el.classList.remove('task-dragging','drag-over-before','drag-over-after');
  });
  _dragId = null; _dragOverId = null; _dragOverPos = null;
}

// ── Category colours ──────────────────────────────────────
const CAT_PALETTE = ['#6366F1','#8B5CF6','#EC4899','#14B8A6','#F59E0B','#EF4444','#10B981','#3B82F6'];
function getCatColor(name) {
  const idx = Object.keys(state.categories).indexOf(name);
  return CAT_PALETTE[idx >= 0 ? idx % CAT_PALETTE.length : CAT_PALETTE.length - 1];
}

// ── Grouped task list (Category → Subcategory → Tasks) ────
function renderGroupedTasks(tasks) {
  if (state.tasks.length === 0) {
    return `<div style="text-align:center;padding:60px 20px;">
      <div style="font-size:3rem;margin-bottom:12px;">📝</div>
      <p style="color:#6B7280;font-size:16px;font-weight:500;">No tasks yet</p>
      <p style="color:#9CA3AF;font-size:13px;margin-top:4px;">Add your first task to get started!</p>
      <button onclick="openAddModal()" style="margin-top:16px;background:#4F46E5;color:white;border:none;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Add First Task</button>
    </div>`;
  }

  // Pull focused tasks to top; remove them from their category groups
  const focusedInView = tasks.filter(t => state.focusedTaskIds.includes(t.id));
  tasks = tasks.filter(t => !state.focusedTaskIds.includes(t.id));

  const catKeys = Object.keys(state.categories);

  // Build lookup: cat → subcat → [tasks] (preserving order from state.tasks via `tasks` array)
  const grouped = {};
  catKeys.forEach(c => {
    grouped[c] = { __other__: [] };
    (state.categories[c] || []).forEach(s => { grouped[c][s] = []; });
  });
  grouped['__none__'] = { __other__: [] };

  tasks.forEach(t => {
    const cat = (t.category && grouped[t.category] !== undefined) ? t.category : '__none__';
    const bucket = grouped[cat];
    const sub = (t.subcategory && bucket[t.subcategory] !== undefined) ? t.subcategory : '__other__';
    bucket[sub].push(t);
  });

  let html = '';

  // Daily Focus section — pinned tasks float to the top
  if (focusedInView.length > 0) {
    html += `
    <div style="margin-bottom:36px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:7px 12px;border-radius:10px;background:#FFFBEB;cursor:default;">
        <div style="width:4px;height:22px;background:#F59E0B;border-radius:999px;flex-shrink:0;"></div>
        <span style="font-size:12.5px;font-weight:800;color:#111827;text-transform:uppercase;letter-spacing:0.07em;">⭐ Daily Focus</span>
        <span style="font-size:11px;font-weight:700;color:white;background:#F59E0B;padding:1px 8px;border-radius:999px;">${focusedInView.length}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;padding-left:10px;border-left:3px solid #FDE68A;margin-left:8px;">
        ${focusedInView.map(t => renderCard(t)).join('')}
      </div>
    </div>`;
  }

  catKeys.forEach(cat => {
    if (state.filters.category !== 'all' && state.filters.category !== cat) return;
    const color     = getCatColor(cat);
    const catTasks  = tasks.filter(t => t.category === cat);
    if (catTasks.length === 0) return; // hide categories with no tasks
    const subcats   = state.categories[cat] || [];

    html += `
      <div style="margin-bottom:36px;">
        <!-- Category header -->
        <div ondragover="event.preventDefault()" ondrop="dropOnSection(event,'${h(cat)}')"
          style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:7px 12px;border-radius:10px;background:${color}14;cursor:default;"
          onmouseover="this.style.background='${color}22'" onmouseout="this.style.background='${color}14'">
          <div style="width:4px;height:22px;background:${color};border-radius:999px;flex-shrink:0;"></div>
          <span style="font-size:12.5px;font-weight:800;color:#111827;text-transform:uppercase;letter-spacing:0.07em;">${h(cat)}</span>
          <span style="font-size:11px;font-weight:700;color:white;background:${color};padding:1px 8px;border-radius:999px;">${catTasks.length}</span>
        </div>

        <!-- Subcategory sections -->
        <div style="display:flex;flex-direction:column;gap:16px;padding-left:10px;border-left:3px solid ${color}30;margin-left:8px;">`;

    subcats.forEach(subcat => {
      if (state.filters.subcategory !== 'all' && state.filters.subcategory !== subcat) return;
      const subcatTasks = grouped[cat][subcat] || [];
      if (subcatTasks.length === 0) return; // hide empty subcategories

      html += `
          <div>
            <!-- Subcategory header -->
            <div ondragover="event.preventDefault()" ondrop="dropOnSubsection(event,'${h(cat)}','${h(subcat)}')"
              style="display:flex;align-items:center;gap:7px;margin-bottom:7px;padding:4px 8px;border-radius:7px;cursor:default;"
              onmouseover="this.style.background='#F1F5F9'" onmouseout="this.style.background='transparent'">
              <svg width="7" height="10" viewBox="0 0 7 10" style="flex-shrink:0;"><polygon points="0,0 7,5 0,10" fill="${color}" opacity="0.65"/></svg>
              <span style="font-size:11.5px;font-weight:700;color:#4B5563;">${h(subcat)}</span>
              <span style="font-size:10.5px;color:#9CA3AF;background:#F3F4F6;padding:0 5px;border-radius:999px;">${subcatTasks.length}</span>
            </div>
            ${subcatTasks.length === 0 ? `
              <div ondragover="event.preventDefault()" ondrop="dropOnSubsection(event,'${h(cat)}','${h(subcat)}')"
                style="background:white;border:1.5px dashed #E5E7EB;border-radius:10px;padding:12px 16px;text-align:center;color:#D1D5DB;font-size:12px;display:flex;align-items:center;justify-content:center;min-height:40px;margin-left:14px;">
                Drop a task here
              </div>
            ` : `
              <div style="display:flex;flex-direction:column;gap:8px;margin-left:14px;">
                ${subcatTasks.map(t => renderCard(t)).join('')}
              </div>
            `}
          </div>`;
    });

    // Tasks in this category with no recognised subcategory
    const otherTasks = grouped[cat]['__other__'] || [];
    if (otherTasks.length > 0 && state.filters.subcategory === 'all') {
      html += `
          <div>
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;padding:4px 8px;border-radius:7px;">
              <svg width="7" height="10" viewBox="0 0 7 10"><polygon points="0,0 7,5 0,10" fill="#9CA3AF" opacity="0.65"/></svg>
              <span style="font-size:11.5px;font-weight:700;color:#9CA3AF;">Other</span>
              <span style="font-size:10.5px;color:#9CA3AF;background:#F3F4F6;padding:0 5px;border-radius:999px;">${otherTasks.length}</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;margin-left:14px;">
              ${otherTasks.map(t => renderCard(t)).join('')}
            </div>
          </div>`;
    }

    html += `
        </div>
      </div>`;
  });

  // Uncategorized tasks (no category set)
  const noneTasks = grouped['__none__']['__other__'] || [];
  if (noneTasks.length > 0) {
    html += `
      <div style="margin-bottom:28px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:7px 12px;border-radius:10px;background:#F9FAFB;">
          <div style="width:4px;height:22px;background:#9CA3AF;border-radius:999px;flex-shrink:0;"></div>
          <span style="font-size:12.5px;font-weight:800;color:#111827;text-transform:uppercase;letter-spacing:0.07em;">Uncategorized</span>
          <span style="font-size:11px;font-weight:700;color:white;background:#9CA3AF;padding:1px 8px;border-radius:999px;">${noneTasks.length}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${noneTasks.map(t => renderCard(t)).join('')}
        </div>
      </div>`;
  }

  return html || `<div style="text-align:center;padding:40px;color:#9CA3AF;font-size:14px;">No tasks match your filters</div>`;
}

function renderCard(t) {

              ${t.collaborators?(t.collaborators.split(',').map(n=>n.trim()).filter(Boolean).map(n=>`<span style="font-size:11px;background:#F0FDF4;color:#166534;padding:2px 8px;border-radius:999px;border:1px solid #BBF7D0;">🤝 ${h(n)}</span>`).join('')):''}

                ${h(jiraKey(t.jiraTicket))}
              </a>`:''}
              ${(t.attachments||[]).map(a=>`
                <a href="${h(a.url)}" target="_blank" rel="noopener"
                  title="${h(a.url)}"
                  style="font-size:11px;background:#F8FAFC;color:#374151;padding:2px 8px;border-radius:4px;border:1px solid #E5E7EB;text-decoration:none;display:inline-flex;align-items:center;gap:3px;max-width:140px;">
                  <span style="flex-shrink:0;">📎</span>
                  <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h(a.name)}</span>

              ${t.notes?`<button onclick="toggleNotes('${t.id}')" style="font-size:11px;color:${isExp?'#4F46E5':'#9CA3AF'};background:${isExp?'#EEF2FF':'transparent'};border:none;cursor:pointer;padding:2px 8px;border-radius:4px;display:flex;align-items:center;gap:3px;">
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                ${isExp?'Hide note':'View note'}
              </button>`:''}
            </div>

            <!-- Notes expanded -->
            ${t.notes && isExp ? `
              <div style="margin-top:10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px 12px;font-size:13px;color:#92400E;white-space:pre-wrap;line-height:1.5;">${h(t.notes)}</div>
            ` : ''}

            <!-- Subtasks -->
            ${renderSubtasks(t)}
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── Attachments (managed via modal) ──────────────────────
let _pendingAttachments = [];

function modalAddAttachment() {
  const urlEl  = document.getElementById('f_attach_url');
  const nameEl = document.getElementById('f_attach_name');
  const url  = urlEl?.value.trim();
  const name = nameEl?.value.trim();
  if (!url) { urlEl?.focus(); return; }
  _pendingAttachments.push({
    id:   Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
    name: name || url,
    url
  });
  if (urlEl)  urlEl.value  = '';
  if (nameEl) nameEl.value = '';
  renderModalAttachments();
  urlEl?.focus();
}

function modalRemoveAttachment(id) {
  _pendingAttachments = _pendingAttachments.filter(a => a.id !== id);
  renderModalAttachments();
}

function renderModalAttachments() {
  const container = document.getElementById('f_attachments_list');
  if (!container) return;
  if (_pendingAttachments.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = _pendingAttachments.map(a => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#F8FAFC;border-radius:7px;border:1px solid #E5E7EB;">
      <span style="font-size:13px;flex-shrink:0;">📎</span>
      <a href="${h(a.url)}" target="_blank" rel="noopener"
        style="flex:1;font-size:12.5px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;"
        title="${h(a.url)}">${h(a.name)}</a>
      <button onclick="modalRemoveAttachment('${a.id}')"
        style="border:none;background:transparent;cursor:pointer;color:#D1D5DB;font-size:16px;padding:0 2px;line-height:1;flex-shrink:0;"
        onmouseover="this.style.color='#EF4444'" onmouseout="this.style.color='#D1D5DB'">×</button>
    </div>
  `).join('');
}

// ── Add / Edit Modal ──────────────────────────────────────
let _editingId = null;

function openAddModal() {
  _editingId = null;
  _pendingAttachments = [];
  showTaskModal(null);
}

function openEditModal(id) {
  _editingId = id;
  const task = state.tasks.find(t => t.id === id);
  _pendingAttachments = JSON.parse(JSON.stringify(task?.attachments || []));
  showTaskModal(task);
}

function closeModal(id) {
  const el = document.getElementById(id||'taskModal');
  if (el) el.remove();
}

            </div>
            <div>
              <label style="display:block;font-size:12.5px;font-weight:600;color:#374151;margin-bottom:5px;">Priority</label>

              <select id="f_subcategory" style="width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:9px 12px;font-size:13px;color:#374151;background:white;cursor:pointer;">

            <button type="submit" style="flex:2;background:#4F46E5;color:white;border:none;padding:9px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">${task?'Save Changes':'Add Task'}</button>

        </form>
      </div>

  `;
  document.body.appendChild(el);
  document.getElementById('f_title').focus();
  renderModalAttachments();
}

function onModalStatusChange() {
  const wrap = document.getElementById('f_assigneeWrap');
  if (wrap) wrap.style.display = document.getElementById('f_status').value==='delegate' ? 'block' : 'none';
}

function onModalCatChange() {
  const cat = document.getElementById('f_category')?.value;
  const sub = document.getElementById('f_subcategory');
  if (!sub) return;
  const items = cat ? (state.categories[cat]||[]) : [];
  sub.innerHTML = '<option value="">None</option>' + items.map(s=>`<option value="${h(s)}">${h(s)}</option>`).join('');
}

function submitTaskForm(e) {
  e.preventDefault();
  const status = document.getElementById('f_status').value;
  const data = {
    title: document.getElementById('f_title').value.trim(),
    status,
    priority: document.getElementById('f_priority').value,
    category: document.getElementById('f_category').value,
    subcategory: document.getElementById('f_subcategory').value,
    assignee: status==='delegate' ? (document.getElementById('f_assignee')?.value.trim()||'') : '',
    collaborators: document.getElementById('f_collaborators').value.trim(),
    jiraTicket: document.getElementById('f_jiraTicket').value.trim(),
    attachments: _pendingAttachments || [],
    notes: document.getElementById('f_notes').value.trim()
  };
  if (!data.title) return;
  if (_editingId) updateTask(_editingId, data);
  else addTask(data);
  closeModal('taskModal');
}

function saveConfluenceSettings() {
  state.confluenceSite      = (document.getElementById('confSite')?.value || '').trim().replace(/^https?:\/\//, '').replace(/\/$/, '');
  state.confluenceEmail     = (document.getElementById('confEmail')?.value || '').trim();
  state.confluenceToken     = (document.getElementById('confToken')?.value || '').trim();
  state.confluenceSpaceKey  = (document.getElementById('confSpaceKey')?.value || '').trim();
  state.confluenceParentId  = (document.getElementById('confParentId')?.value || '').trim();
  localStorage.setItem('confluence_site',       state.confluenceSite);
  localStorage.setItem('confluence_email',      state.confluenceEmail);
  localStorage.setItem('confluence_token',      state.confluenceToken);
  localStorage.setItem('confluence_space_key',  state.confluenceSpaceKey);
  localStorage.setItem('confluence_parent_id',  state.confluenceParentId);
  const btn = document.getElementById('confSaveBtn');
  if (btn) { btn.textContent = 'Saved!'; btn.style.background = '#22C55E'; setTimeout(function() { btn.textContent = 'Save'; btn.style.background = '#4F46E5'; }, 1500); }
}

function addCategory() {
  const input = document.getElementById('newCatInput');
  const name = input?.value.trim();
  if (!name || state.categories[name]) return;
  state.categories[name] = [];
  saveState();
  openSettings();
}

function deleteCategory(cat) {
  if (!confirm(`Delete category "${cat}"? Tasks using it won't be deleted.`)) return;
  delete state.categories[cat];
  saveState();
  openSettings();
  renderApp();
}

function addSubcat(cat) {
  const input = document.getElementById('newSub_' + safeId(cat));
  const name = input?.value.trim();
  if (!name || !state.categories[cat]) return;
  if (!state.categories[cat].includes(name)) {
    state.categories[cat].push(name);
    saveState();
  }
  openSettings();
}

function deleteSubcat(cat, sub) {
  if (!state.categories[cat]) return;
  state.categories[cat] = state.categories[cat].filter(s=>s!==sub);
  saveState();
  openSettings();
}

function copySync() {
  const ta = document.getElementById('syncExport');
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(()=>btn.textContent='Copy all',2000); }
  }).catch(() => { ta.select(); document.execCommand('copy'); });
}

function importSync() {
  const raw = document.getElementById('syncImport')?.value.trim();
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    if (!Array.isArray(data.tasks)) { alert('Invalid format — expected { tasks: [...] }'); return; }
    state.tasks = data.tasks;
    state.version = (data.version || state.version) + 1;
    if (data.categories) state.categories = data.categories;
    saveState();
    closeModal('syncModal');
    renderApp();
  } catch(e) {
    alert('Could not parse JSON. Please double-check the data.');
  }
}

function approvePending(id) {
  const p = state.pendingTasks.find(t => t.id === id);
  if (!p) return;
  // Mark as handled so it never reappears after a version bump
  if (p.sourceUrl && !state.dismissedIds.includes(p.sourceUrl)) {
    state.dismissedIds.push(p.sourceUrl);
  }
  addTask({
    title:       p.title,
    status:      'todo',
    priority:    p.suggestedPriority || 'medium',
    category:    p.suggestedCategory || '',
    subcategory: p.suggestedSubcategory || '',
    notes:       'From Slack — ' + p.sourceFrom + ' in ' + p.sourceChannel + ' (' + p.sourceDate + ')\n\n' + p.context,
    attachments: p.sourceUrl ? [{ id: Date.now().toString(36) + Math.random().toString(36).substr(2,4), name: '\uD83D\uDCAC Slack: ' + p.sourceChannel + ' \u2014 ' + p.sourceFrom, url: p.sourceUrl }] : []
  });
  state.pendingTasks = state.pendingTasks.filter(t => t.id !== id);
  saveState();
  const modal = document.getElementById('slackModal');
  if (modal) {
    const list = document.getElementById('slackPendingList');
    if (list) renderSlackPendingList(list);
    const badge = modal.querySelector('#slackModalBadge');
    if (badge) badge.textContent = state.pendingTasks.length;
  }
  renderApp();
}

function dismissPending(id) {
  const task = state.pendingTasks.find(t => t.id === id);
  if (task && task.sourceUrl && !state.dismissedIds.includes(task.sourceUrl)) {
    state.dismissedIds.push(task.sourceUrl);
  }
  state.pendingTasks = state.pendingTasks.filter(t => t.id !== id);
  saveState();
  const list = document.getElementById('slackPendingList');
  if (list) renderSlackPendingList(list);
  renderApp();
}
