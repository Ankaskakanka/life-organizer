// ── File System Save ──────────────────────────────────────
let _fileHandle = null;
let _autoSaveTimer = null;
let _unsaved = false;

// ── IndexedDB: persist file handle across page reloads ────
function _openHandleDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('anna_tasks_db', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject();
  });
}
function _storeFileHandle(handle) {
  _openHandleDB().then(db => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'taskFile');
  }).catch(() => {});
}
async function _getStoredHandle() {
  try {
    const db = await _openHandleDB();
    return new Promise(resolve => {
      const req = db.transaction('handles', 'readonly').objectStore('handles').get('taskFile');
      req.onsuccess = e => resolve(e.target.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}
// Called on boot — silently restores handle if permission already granted
async function restoreFileHandle() {
  if (!('showSaveFilePicker' in window)) return;
  const handle = await _getStoredHandle();
  if (!handle) return;
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') { _fileHandle = handle; setSaveStatus('saved'); }
  } catch(e) {}
}

function getUpdatedHtml() {
  const newData = JSON.stringify({
    version:          state.version,
    tasks:            state.tasks,
    categories:       state.categories,
    pendingTasks:     state.pendingTasks,
    dismissedIds:     state.dismissedIds,
    jiraPendingTasks:        state.jiraPendingTasks,
    jiraDismissedIds:        state.jiraDismissedIds,
    confluencePendingTasks:  state.confluencePendingTasks,
    confluenceDismissedIds:  state.confluenceDismissedIds,
    focusedTaskIds:          state.focusedTaskIds,
    discoveryProjects:       state.discoveryProjects,
    prdProjects:             state.prdProjects,
    confluenceUrlsByTitle:   APP_DATA.confluenceUrlsByTitle || {},
    confluencePublishQueue:  state.confluencePublishQueue || []
  }, null, 2);
  let src = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  // Replace everything from "const APP_DATA = {" up to "}" immediately before
  // the END APP DATA marker — greedy match so it always captures the full block
  src = src.replace(
    /(const APP_DATA = )\{[\s\S]*\}(;\n\/\/ =+\n\/\/ END APP DATA)/,
    '$1' + newData + '$2'
  );
  return src;
}

async function saveFile() {
  if (!('showSaveFilePicker' in window)) { downloadFile(); return; }
  try {
    if (!_fileHandle) {
      // Try to reuse a previously stored handle (asks for permission if needed)
      const stored = await _getStoredHandle();
      if (stored) {
        try {
          const perm = await stored.requestPermission({ mode: 'readwrite' });
          if (perm === 'granted') _fileHandle = stored;
        } catch(e) {}
      }
      // If still no handle, show the Save As picker
      if (!_fileHandle) {
        _fileHandle = await window.showSaveFilePicker({
          suggestedName: 'my-tasks.html',
          types: [{ description: 'Task Manager HTML', accept: { 'text/html': ['.html'] } }]
        });
        _storeFileHandle(_fileHandle); // remember it for next time
      }
    }
    const writable = await _fileHandle.createWritable();
    await writable.write(getUpdatedHtml());
    await writable.close();
    _unsaved = false;
    setSaveStatus('saved');
    renderBanner();
  } catch(e) {
    if (e.name !== 'AbortError') { _fileHandle = null; setSaveStatus('error'); }
  }
}

function downloadFile() {
  const blob = new Blob([getUpdatedHtml()], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'my-tasks.html'; a.click();
  URL.revokeObjectURL(url);
  setSaveStatus('saved');
}

function setSaveStatus(status) {
  const el = document.getElementById('saveStatusDot');
  const lb = document.getElementById('saveStatusLabel');
  if (!el || !lb) return;
  if (status === 'saved')  { el.style.background='#22C55E'; lb.textContent='Saved'; }
  if (status === 'unsaved'){ el.style.background='#F59E0B'; lb.textContent='Unsaved'; }
  if (status === 'error')  { el.style.background='#EF4444'; lb.textContent='Save error'; }
}

function renderBanner() {
  const el = document.getElementById('autosave-banner');
  if (!el) return;
  if (_fileHandle) {
    el.innerHTML = '';
    el.style.display = 'none';
  } else {
    el.style.display = 'block';
    el.innerHTML = `<div onclick="saveFile()" style="background:#FEFCE8;border-bottom:2px solid #FDE68A;padding:11px 20px;text-align:center;cursor:pointer;font-size:13.5px;color:#92400E;display:flex;align-items:center;justify-content:center;gap:8px;user-select:none;" onmouseover="this.style.background='#FEF9C3'" onmouseout="this.style.background='#FEFCE8'">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
      <span><strong>Auto-save is off</strong> — click here to link your file and enable auto-save</span>
    </div>`;
  }
}

function scheduleAutoSave() {
  _unsaved = true;
  setSaveStatus('unsaved');
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(() => saveFile(), 1200); // always auto-save
}

// ── Confluence Pending ────────────────────────────────────
function approveConfluencePending(id) {
  const p = state.confluencePendingTasks.find(t => t.id === id);
  if (!p) return;
  // Mark as handled so it never reappears after a version bump
  if (p.sourceUrl && !state.confluenceDismissedIds.includes(p.sourceUrl)) {
    state.confluenceDismissedIds.push(p.sourceUrl);
  }
  addTask({
    title:       p.title,
    status:      'todo',
    priority:    p.suggestedPriority || 'medium',
    category:    p.suggestedCategory || '',
    subcategory: p.suggestedSubcategory || '',
    notes:       'From Confluence — ' + p.sourceFrom + ' on "' + p.pageTitle + '" (' + p.sourceDate + ')\n\n' + p.context,
    attachments: p.sourceUrl ? [{ id: Date.now().toString(36) + Math.random().toString(36).substr(2,4), name: '📄 Confluence: ' + p.pageTitle, url: p.sourceUrl }] : []
  });
  state.confluencePendingTasks = state.confluencePendingTasks.filter(t => t.id !== id);
  saveState();
  const badge = document.getElementById('confluenceBadge');
  if (badge) badge.textContent = state.confluencePendingTasks.length;
  const list = document.getElementById('confluencePendingList');
  if (list) renderConfluencePendingList(list);
  renderApp();
}

function dismissConfluencePending(id) {
  const task = state.confluencePendingTasks.find(t => t.id === id);
  if (task && task.sourceUrl && !state.confluenceDismissedIds.includes(task.sourceUrl)) {
    state.confluenceDismissedIds.push(task.sourceUrl);
  }
  state.confluencePendingTasks = state.confluencePendingTasks.filter(t => t.id !== id);
  saveState();
  const list = document.getElementById('confluencePendingList');
  if (list) renderConfluencePendingList(list);
  renderApp();
}

function renderConfluencePendingList(container) {
  const sourceTypeLabel = t => {
    if (t.sourceType === 'mention_in_page')    return '📝 Mentioned in page';
    if (t.sourceType === 'mention_in_comment') return '💬 Mentioned in comment';
    return '💬 Comment on your page';
  };
  if (state.confluencePendingTasks.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:32px 16px;color:#9CA3AF;">
      <div style="font-size:28px;margin-bottom:8px;">📄</div>
      <div style="font-size:14px;font-weight:500;margin-bottom:4px;">No pending Confluence items</div>
      <div style="font-size:12px;">Mentions on your pages and @-tags are checked automatically.<br>The next auto-sync runs at 16:00 CET.</div>
    </div>`;
    return;
  }
  container.innerHTML = state.confluencePendingTasks.map(p => `
    <div style="background:white;border:1px solid #E5E7EB;border-radius:10px;padding:14px 16px;margin-bottom:10px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;">
        <div style="font-size:13px;font-weight:600;color:#111827;line-height:1.4;">${p.title}</div>
        <span style="font-size:10px;white-space:nowrap;color:#6B7280;background:#F3F4F6;padding:2px 7px;border-radius:999px;">${p.sourceDate}</span>
      </div>
      <div style="font-size:11px;color:#6B7280;margin-bottom:4px;">${sourceTypeLabel(p)} · <strong style="color:#374151">${p.sourceFrom}</strong> on <em>${p.pageTitle}</em></div>
      <div style="font-size:12px;color:#374151;background:#F9FAFB;border-left:3px solid #E5E7EB;padding:6px 10px;border-radius:0 6px 6px 0;margin:8px 0;line-height:1.5;">"${p.context}"</div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button onclick="approveConfluencePending('${p.id}')" style="flex:1;background:#4F46E5;color:white;border:none;padding:8px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">✓ Add as task</button>
        <a href="${p.sourceUrl}" target="_blank" style="flex:0;background:white;color:#4F46E5;border:1px solid #C7D2FE;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;">View</a>
        <button onclick="dismissConfluencePending('${p.id}')" style="flex:1;background:white;color:#6B7280;border:1px solid #E5E7EB;padding:8px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;">✕ Dismiss</button>
      </div>
    </div>`).join('');
}

function openConfluenceModal() {
  const overlay = document.createElement('div');
  overlay.id = 'confluenceModalOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div style="background:white;border-radius:16px;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
      <div style="padding:20px 20px 16px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <h2 style="font-size:16px;font-weight:700;color:#111827;margin:0;">📄 Confluence</h2>
          <p style="font-size:12px;color:#6B7280;margin:2px 0 0;">Mentions &amp; comments on your pages — approve to add as tasks</p>
        </div>
        <button onclick="document.getElementById('confluenceModalOverlay').remove()" style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:20px;padding:4px;">✕</button>
      </div>
      <div id="confluencePendingList" class="modal-scroll" style="padding:16px;overflow-y:auto;flex:1;"></div>
    </div>`;
  document.body.appendChild(overlay);
  renderConfluencePendingList(document.getElementById('confluencePendingList'));
}

// ── Boot ──────────────────────────────────────────────────
loadState();
restoreFileHandle().then(() => { renderApp(); renderBanner(); });

// Warn before closing if there are unsaved changes
window.addEventListener('beforeunload', e => {
  if (_unsaved) {
    e.preventDefault();
    e.returnValue = 'You have unsaved changes. Click Save before closing!';
  }
});
</script>
</body>
</html>
